// ─── ANALYSIS ENGINE ───
function runScan(text, ua) {
  const lower = text.toLowerCase();
  const raw = lower.replace(/\([^)]*\)/g, m => m.replace(/,/g, "§")).split(/[,;]/).map(s => s.replace(/§/g, ",").trim()).filter(s => s.length > 1);
  const items = []; const dSet = new Set(); const cSet = new Set();
  raw.forEach(ing => {
    const c = ing.replace(/^\d+%?\s*(or less of:?\s*)?/i,"").replace(/[()]/g," ").replace(/\s+/g," ").trim();
    if (!c) return;
    let m = false;
    const sk = new Set();
    FP.forEach(r => { if (c.includes(r.p)) r.s.forEach(s => sk.add(s)); });
    for (const aid of ua) {
      if (sk.has(aid)) continue;
      const a = AL.find(x => x.id === aid);
      if (!a) continue;
      for (const v of a.v) {
        if (c.includes(v)) {
          items.push({ingredient:c,status:"danger",allergen:a.label,reason:v===c?`Direct ${a.label.toLowerCase()} allergen`:`Contains "${v}" — ${a.label.toLowerCase()} derivative`});
          dSet.add(aid); m = true; break;
        }
      }
      if (m) break;
    }
    if (!m) {
      for (const amb of AMB) {
        if (c.includes(amb.p)) {
          const rel = amb.r.filter(a => ua.includes(a));
          if (rel.length > 0 || amb.r.length === 0) {
            items.push({ingredient:c,status:"caution",allergen:rel.map(a=>AL.find(x=>x.id===a)?.label).filter(Boolean).join(", ")||"Cross-contamination",reason:amb.w});
            rel.forEach(a => cSet.add(a)); m = true; break;
          }
        }
      }
    }
    if (!m) items.push({ingredient:c,status:"safe",allergen:null,reason:"No match"});
  });
  let overall = "safe", summary = "";
  if (dSet.size > 0) { overall = "danger"; summary = `Contains ${[...dSet].map(id=>AL.find(a=>a.id===id)?.label).join(", ")} allergens.`; }
  else if (cSet.size > 0) { overall = "caution"; summary = "Some ingredients may contain hidden allergen derivatives."; }
  else summary = "No allergens detected for your profile.";
  return { overall, items, summary };
}

// ─── MULTI-USER STORAGE ───
const USERS_KEY = "easyeats-users"; // stores {username: {password, name, allergens, history, createdAt}}
const SESSION_KEY = "easyeats-session"; // stores current username

function loadUsers() { try { const r = localStorage.getItem(USERS_KEY); return r ? JSON.parse(r) : {}; } catch(e) { return {}; } }
function saveUsers(users) { try { localStorage.setItem(USERS_KEY, JSON.stringify(users)); } catch(e) { console.error(e); } }
function loadSession() { try { return localStorage.getItem(SESSION_KEY); } catch(e) { return null; } }
function saveSession(username) { try { localStorage.setItem(SESSION_KEY, username); } catch(e) { console.error(e); } }
function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch(e) { console.error(e); } }

  // Haversine distance in miles
  const haversine = (lat1, lon1, lat2, lon2) => {
    const R = 3959;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.pow(Math.sin(dLat/2),2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.pow(Math.sin(dLon/2),2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  };

  const searchWithOSM = async (locationName) => {
    try {
      // Step 1: Geocode location with Nominatim
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationName)}&limit=1&countrycodes=us`, {
        headers: { "User-Agent": "EasyEats/1.0" }
      });
      const geoData = await geoRes.json();
      if (!geoData.length) return null;

      const lat = parseFloat(geoData[0].lat);
      const lon = parseFloat(geoData[0].lon);
      const displayName = geoData[0].display_name.split(",").slice(0,2).join(",").trim();

      // Step 2: Query Overpass for restaurants/fast food within ~10 miles (16km)
      const overpassQuery = `[out:json][timeout:15];(node["amenity"="fast_food"](around:16000,${lat},${lon});node["amenity"="restaurant"](around:16000,${lat},${lon});node["amenity"="cafe"](around:16000,${lat},${lon});node["amenity"="ice_cream"](around:16000,${lat},${lon}););out body 300;`;
      const overpassRes = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`);
      const overpassData = await overpassRes.json();

      if (!overpassData.elements?.length) return null;

      // Step 3: Match OSM results to our chain database
      const results = [];
      const seen = new Set(); // avoid duplicate locations
      overpassData.elements.forEach(el => {
        const name = el.tags?.name;
        const chain = matchChain(name);
        if (!chain) return;
        
        const dist = haversine(lat, lon, el.lat, el.lon);
        if (dist > 10) return;
        
        // Build address from OSM tags
        const street = el.tags?.["addr:street"] || "";
        const houseNum = el.tags?.["addr:housenumber"] || "";
        const city = el.tags?.["addr:city"] || displayName;
        const addr = houseNum && street ? `${houseNum} ${street}, ${city}` : street ? `${street}, ${city}` : city;
        
        const locKey = `${chain.id}-${el.id}`;
        if (seen.has(locKey)) return;
        seen.add(locKey);

        results.push({
          ...chain,
          locId: locKey,
          address: addr,
          distance: parseFloat(dist.toFixed(1)),
          osmId: el.id,
        });
      });

      if (results.length === 0) return null;
      return { results: results.sort((a,b) => a.distance - b.distance), displayName };
    } catch (e) {
      console.log("OSM fetch failed, using fallback:", e);
      return null;
    }
  };

    lines.push("", `${result.items.filter(i=>i.status==="safe").length} safe ingredients`);
    const text = lines.join("\n");
    setShareText(text);
    try {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position="fixed"; ta.style.left="-9999px";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true); setTimeout(()=>{setCopied(false);setShareText("");},2500);
    } catch(e) { setCopied(false); }
  };

  // Emergency card save
  const saveEmergency = () => {
    saveProf({ emergencyContact, emergencyPhone });
    setShowEmergencyEdit(false);
  };

  // Get safe product alternatives by category
  const getSafeAlternatives = (scannedLabel) => {
    if (!prof?.allergens) return { products: [] };
    // Detect category from scanned label
    const lbl = (scannedLabel||"").toLowerCase();
    const scannedProduct = PRODUCTS.find(p => p.name.toLowerCase() === lbl);
    const scannedCat = scannedProduct?.cat || null;
    const catKeywords = { cookie:["cookie","oreo","chips ahoy","nutter","enjoy life"], snack:["chip","cheeto","dorito","pretzel","cracker","pirate","tostito","lay"], bar:["bar","clif","kind","rxbar","gomacro"], spread:["butter","spread","nutella","skippy","sunbutter"] };
    let detectedCat = scannedCat;
    if (!detectedCat) {
      for (const [cat, kws] of Object.entries(catKeywords)) {
        if (kws.some(kw => lbl.includes(kw))) { detectedCat = cat; break; }
      }
    }

    // Safe products in same category first, then others
    const safeProducts = PRODUCTS.filter(p => {
      if (p.name.toLowerCase() === lbl) return false;
      const r = runScan(p.ing, prof.allergens);
      return r.overall === "safe";
    });
    const sameCat = detectedCat ? safeProducts.filter(p => p.cat === detectedCat) : [];
    const otherCat = safeProducts.filter(p => !sameCat.includes(p));

    return {
      products: [...sameCat, ...otherCat.slice(0, Math.max(0, 4 - sameCat.length))].slice(0, 4),
    };
  };

  if (!loaded) return <div style={{minHeight:"100vh",background:S.bg,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:S.f}}>Loading...</div>;

  // ─── AUTH SCREENS ───
  if (!currentUser) return (
    <div style={{minHeight:"100vh",background:S.bg,fontFamily:S.f,color:"#e8e6f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div style={{maxWidth:"420px",width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:"32px"}}>
          <div style={{width:"64px",height:"64px",borderRadius:"18px",background:"linear-gradient(135deg,#22c55e,#16a34a)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:"32px",marginBottom:"16px"}}>🍽</div>
          <h1 style={{fontFamily:S.sf,fontSize:"36px",fontWeight:800,color:"#fff",margin:"0 0 8px"}}>Easy Eats</h1>
          <p style={{color:S.mut,fontSize:"14px"}}>Your personal allergen safety assistant</p>
        </div>

        {authMode==="setupAllergens"?(
          <div style={{background:S.card,border:`1px solid ${S.brd}`,borderRadius:"20px",padding:"28px"}}>
            <button onClick={()=>{setAuthMode("signup");setAuthError("");}} style={{background:"none",border:"none",color:S.p,fontSize:"13px",cursor:"pointer",fontFamily:S.f,padding:"0 0 12px"}}>← Back</button>
            <h2 style={{fontFamily:S.sf,fontSize:"20px",fontWeight:800,color:"#fff",margin:"0 0 6px"}}>Select your allergens</h2>
            <p style={{color:S.mut,fontSize:"12px",marginBottom:"16px"}}>Choose all that apply. You can edit these later.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}}>
              {AL.map(a=>{const sel=authAllergens.includes(a.id);return(
                <button key={a.id} onClick={()=>setAuthAllergens(p=>sel?p.filter(x=>x!==a.id):[...p,a.id])}
                  style={{padding:"10px 8px",background:sel?S.pbg:S.card,border:sel?"1.5px solid rgba(139,92,246,0.5)":`1.5px solid ${S.brd}`,borderRadius:"10px",cursor:"pointer",display:"flex",alignItems:"center",gap:"6px",fontFamily:S.f,color:sel?"#c4b5fd":"rgba(255,255,255,0.5)",fontSize:"12px",fontWeight:sel?600:400}}>
                  <span style={{fontSize:"18px"}}>{a.icon}</span><span style={{flex:1,textAlign:"left"}}>{a.label}</span>{sel&&<span style={{color:S.p,fontSize:"14px"}}>✓</span>}
                </button>
              );})}
            </div>
            {authError&&<div style={{marginTop:"12px",padding:"10px 14px",borderRadius:"8px",background:"rgba(239,68,68,0.1)",color:"#fca5a5",fontSize:"12px"}}>{authError}</div>}
            <button onClick={finishSignup} disabled={authAllergens.length===0}
              style={{width:"100%",marginTop:"16px",padding:"13px",background:authAllergens.length?"linear-gradient(135deg,#22c55e,#16a34a)":"rgba(255,255,255,0.05)",border:"none",borderRadius:"12px",color:authAllergens.length?"#fff":"rgba(255,255,255,0.2)",fontSize:"15px",fontWeight:700,cursor:authAllergens.length?"pointer":"default",fontFamily:S.f}}>
              Create Account ({authAllergens.length} allergens)
            </button>
          </div>
        ):(
          <div style={{background:S.card,border:`1px solid ${S.brd}`,borderRadius:"20px",padding:"28px"}}>
            <h2 style={{fontFamily:S.sf,fontSize:"20px",fontWeight:800,color:"#fff",margin:"0 0 16px"}}>{authMode==="login"?"Log In":"Sign Up"}</h2>

            {authMode==="signup"&&<>
              <label style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:"6px"}}>Display Name</label>
              <input value={authName} onChange={e=>setAuthName(e.target.value)} placeholder="Your name"
                style={{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,0.05)",border:`1.5px solid ${S.brd}`,borderRadius:"10px",color:"#fff",fontSize:"14px",fontFamily:S.f,outline:"none",boxSizing:"border-box",marginBottom:"14px"}} />
            </>}

            <label style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:"6px"}}>Username</label>
            <input value={authUser} onChange={e=>{setAuthUser(e.target.value);setAuthError("");}} placeholder={authMode==="login"?"Enter username":"Choose a username"}
              style={{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,0.05)",border:`1.5px solid ${S.brd}`,borderRadius:"10px",color:"#fff",fontSize:"14px",fontFamily:S.f,outline:"none",boxSizing:"border-box",marginBottom:"14px"}} />

            <label style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:"6px"}}>Password</label>
            <div style={{position:"relative",marginBottom:"14px"}}>
              <input type={showPass?"text":"password"} value={authPass} onChange={e=>{setAuthPass(e.target.value);setAuthError("");}} placeholder={authMode==="login"?"Enter password":"Choose a password"} onKeyDown={e=>{if(e.key==="Enter"){authMode==="login"?doLogin():doSignup();}}}
                style={{width:"100%",padding:"12px 14px",paddingRight:"50px",background:"rgba(255,255,255,0.05)",border:`1.5px solid ${S.brd}`,borderRadius:"10px",color:"#fff",fontSize:"14px",fontFamily:S.f,outline:"none",boxSizing:"border-box"}} />
              <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:S.mut,fontSize:"12px",cursor:"pointer",fontFamily:S.f}}>{showPass?"Hide":"Show"}</button>
            </div>

            {authError&&<div style={{marginBottom:"12px",padding:"10px 14px",borderRadius:"8px",background:"rgba(239,68,68,0.1)",color:"#fca5a5",fontSize:"12px"}}>{authError}</div>}

            <button onClick={authMode==="login"?doLogin:doSignup}
              style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",border:"none",borderRadius:"12px",color:"#fff",fontSize:"15px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>

              </button>
            </div>
          </div>

    </div>

        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>

        {/* ═══ HOME ═══ */}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"20px"}}>
            {[{l:"Scans",v:hist.length,c:S.p},{l:"Safe",v:hist.filter(h=>h.overall==="safe").length,c:S.g},{l:"Flagged",v:hist.filter(h=>h.overall==="danger").length,c:S.r}].map(s=>(
              <div key={s.l} style={{padding:"14px 10px",borderRadius:"14px",background:S.card,border:`1px solid ${S.brd}`,textAlign:"center"}}>
                <div style={{fontSize:"26px",fontWeight:800,fontFamily:S.sf,color:s.c}}>{s.v}</div>
                <div style={{fontSize:"10px",color:S.mut,textTransform:"uppercase",letterSpacing:"0.5px"}}>{s.l}</div>
              </div>
            ))}
          </div>
          <h3 style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>Quick Scan</h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"20px"}}>
            {PRODUCTS.slice(0,9).map(p=>(
              <button key={p.name} onClick={()=>doScan(p.ing,p.name)} style={{padding:"12px 8px",background:S.card,border:`1px solid ${S.brd}`,borderRadius:"12px",cursor:"pointer",fontFamily:S.f,color:"#e8e6f0",textAlign:"center"}}>
                <div style={{fontSize:"24px",marginBottom:"4px"}}>{p.icon}</div>
                <div style={{fontSize:"11px",fontWeight:500,lineHeight:1.2}}>{p.name}</div>
              </button>
            ))}
          </div>
          {hist.length>0&&<>
            <h3 style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>Recent Scans</h3>
            {hist.slice(0,8).map(h=>(
              <button key={h.id} onClick={()=>{setViewHist(h);nav("histDetail",true);}} style={{padding:"11px 14px",marginBottom:"4px",background:S.card,border:`1px solid ${S.brd}`,borderRadius:"10px",display:"flex",alignItems:"center",gap:"10px",cursor:"pointer",fontFamily:S.f,color:"#e8e6f0",textAlign:"left",width:"100%"}}>
                <div style={{width:"8px",height:"8px",borderRadius:"50%",background:sc(h.overall),flexShrink:0}} />
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,fontSize:"13px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.label}</div>
                  <div style={{fontSize:"10px",color:S.mut}}>{new Date(h.date).toLocaleDateString()}{h.dc>0&&<span style={{color:S.r,marginLeft:"6px"}}>{h.dc} danger</span>}{h.cc>0&&<span style={{color:S.y,marginLeft:"6px"}}>{h.cc} caution</span>}{h.sc>0&&<span style={{color:S.g,marginLeft:"6px"}}>{h.sc} safe</span>}</div>
                </div>
                <span style={{color:S.mut,fontSize:"14px"}}>→</span>
              </button>
            ))}
          </>}
        </div>}

        {/* ═══ HIST DETAIL ═══ */}
        {pg==="histDetail"&&viewHist&&<div>
          <button onClick={()=>nav("home")} style={{background:"none",border:"none",color:S.p,fontSize:"13px",cursor:"pointer",fontFamily:S.f,padding:"0 0 12px"}}>← Back</button>
          <h2 style={{fontFamily:S.sf,fontSize:"22px",fontWeight:800,color:"#fff",margin:"0 0 4px"}}>{viewHist.label}</h2>
          <div style={{fontSize:"11px",color:S.mut,marginBottom:"12px"}}>{new Date(viewHist.date).toLocaleString()}</div>
          <div style={{padding:"20px",borderRadius:"16px",marginBottom:"14px",background:sb(viewHist.overall),border:`1.5px solid ${sc(viewHist.overall)}33`,textAlign:"center"}}>
            <div style={{fontSize:"40px",marginBottom:"4px"}}>{viewHist.overall==="safe"?"✅":viewHist.overall==="caution"?"⚠️":"🚫"}</div>
            <div style={{fontSize:"20px",fontWeight:800,fontFamily:S.sf,color:sc(viewHist.overall)}}>{viewHist.overall==="safe"?"Likely Safe":viewHist.overall==="caution"?"Use Caution":"Contains Allergens"}</div>
            <div style={{fontSize:"12px",color:S.mut,marginTop:"4px"}}>{viewHist.summary}</div>
          </div>
          <div style={{display:"flex",gap:"6px",marginBottom:"14px"}}>
            {[{l:"Danger",c:viewHist.dc,color:S.r},{l:"Caution",c:viewHist.cc,color:S.y},{l:"Safe",c:viewHist.sc,color:S.g}].map(s=>(
              <div key={s.l} style={{flex:1,padding:"10px",borderRadius:"12px",background:`${s.color}11`,textAlign:"center",border:`1px solid ${s.color}22`}}>
                <div style={{fontSize:"20px",fontWeight:800,fontFamily:S.sf,color:s.color}}>{s.c}</div>
                <div style={{fontSize:"9px",color:s.color,fontWeight:600,textTransform:"uppercase"}}>{s.l}</div>
              </div>
            ))}
          </div>
          {viewHist.items?.filter(i=>i.status!=="safe").length>0&&<div style={{fontSize:"12px",color:S.r,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>✕ Flagged ({viewHist.items.filter(i=>i.status!=="safe").length})</div>}
          {viewHist.items?.filter(i=>i.status!=="safe").map((item,i)=>(
            <div key={i} style={{padding:"11px 14px",marginBottom:"5px",borderRadius:"10px",background:sb(item.status),border:`1px solid ${sc(item.status)}22`,display:"flex",alignItems:"flex-start",gap:"10px"}}>
              <div style={{width:"8px",height:"8px",borderRadius:"50%",marginTop:"5px",background:sc(item.status),flexShrink:0}} />
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:"13px",color:"#fff"}}>{item.ingredient}{item.allergen&&<span style={{marginLeft:"6px",fontSize:"10px",padding:"2px 6px",background:`${sc(item.status)}22`,borderRadius:"4px",color:sc(item.status)}}>{item.allergen}</span>}</div>
                <div style={{fontSize:"11px",color:S.mut,marginTop:"1px"}}>{item.reason}</div>
              </div>
            </div>
          ))}
          {viewHist.items?.filter(i=>i.status==="safe").length>0&&<>
            <div style={{fontSize:"12px",color:S.g,textTransform:"uppercase",letterSpacing:"1px",margin:"12px 0 8px"}}>✓ Safe ({viewHist.items.filter(i=>i.status==="safe").length})</div>
            {viewHist.items.filter(i=>i.status==="safe").map((item,i)=>(
              <div key={i} style={{padding:"8px 14px",marginBottom:"3px",borderRadius:"8px",background:"rgba(34,197,94,0.04)",border:"1px solid rgba(34,197,94,0.1)",fontSize:"12px",color:"rgba(255,255,255,0.5)",display:"flex",alignItems:"center",gap:"8px"}}><span style={{color:S.g}}>✓</span>{item.ingredient}</div>
            ))}
          </>}

          {/* Alternatives for history items */}
          {(viewHist.overall==="danger"||viewHist.overall==="caution")&&(()=>{
            const alts = getSafeAlternatives(viewHist.label);
            return alts.products.length>0&&(
              <div style={{marginTop:"12px",padding:"14px",borderRadius:"12px",background:"rgba(139,92,246,0.06)",border:"1px solid rgba(139,92,246,0.15)"}}>
                <div style={{fontSize:"11px",color:S.p,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"8px"}}>✨ Try These Instead</div>
                <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                  {alts.products.map(p=>(

                      <span style={{fontSize:"18px"}}>{p.icon}</span>
                      <div style={{flex:1}}><div style={{fontWeight:600,fontSize:"12px",color:"#fff"}}>{p.name}</div><div style={{fontSize:"10px",color:S.g}}>✓ Safe for you</div></div>
                      <span style={{color:S.mut,fontSize:"12px"}}>Scan →</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>}

        {/* ═══ SCANNER ═══ */}
        {pg==="scanner"&&<div>
          <h1 style={{fontFamily:S.sf,fontSize:"24px",fontWeight:800,color:"#fff",margin:"0 0 4px"}}>Ingredient Scanner</h1>

        {/* ═══ RESULTS ═══ */}
        {pg==="results"&&res&&<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
            <button onClick={goBackFromResults} style={{background:"none",border:"none",color:S.p,fontSize:"13px",cursor:"pointer",fontFamily:S.f}}>← Back</button>
            <button onClick={()=>shareResults(res,resLabel)} style={{padding:"6px 14px",background:"rgba(255,255,255,0.05)",border:`1px solid ${S.brd}`,borderRadius:"8px",color:copied?S.g:S.mut,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:500,transition:"all 0.2s"}}>
              {copied?"✓ Copied!":"📋 Share Results"}

          </div>
          {resLabel&&<h2 style={{fontFamily:S.sf,fontSize:"22px",fontWeight:800,color:"#fff",margin:"0 0 12px"}}>{resLabel}</h2>}

          <div style={{padding:"22px",borderRadius:"16px",marginBottom:"14px",background:sb(res.overall),border:`1.5px solid ${sc(res.overall)}33`,textAlign:"center"}}>
            <div style={{fontSize:"42px",marginBottom:"4px"}}>{res.overall==="safe"?"✅":res.overall==="caution"?"⚠️":"🚫"}</div>
            <div style={{fontSize:"20px",fontWeight:800,fontFamily:S.sf,color:sc(res.overall),marginBottom:"4px"}}>{res.overall==="safe"?"Likely Safe":res.overall==="caution"?"Use Caution":"Contains Allergens"}</div>
            <div style={{fontSize:"12px",color:S.mut}}>{res.summary}</div>
          </div>
          <div style={{display:"flex",gap:"6px",marginBottom:"14px"}}>
            {[{l:"Danger",c:res.items.filter(i=>i.status==="danger").length,color:S.r},{l:"Caution",c:res.items.filter(i=>i.status==="caution").length,color:S.y},{l:"Safe",c:res.items.filter(i=>i.status==="safe").length,color:S.g}].map(s=>(
              <div key={s.l} style={{flex:1,padding:"10px",borderRadius:"12px",background:`${s.color}11`,textAlign:"center",border:`1px solid ${s.color}22`}}>
                <div style={{fontSize:"20px",fontWeight:800,fontFamily:S.sf,color:s.color}}>{s.c}</div>
                <div style={{fontSize:"9px",color:s.color,fontWeight:600,textTransform:"uppercase"}}>{s.l}</div>
              </div>
            ))}
          </div>
          {res.items.filter(i=>i.status!=="safe").map((item,i)=>(
            <div key={i} style={{padding:"11px 14px",marginBottom:"5px",borderRadius:"10px",background:sb(item.status),border:`1px solid ${sc(item.status)}22`,display:"flex",alignItems:"flex-start",gap:"10px"}}>
              <div style={{width:"8px",height:"8px",borderRadius:"50%",marginTop:"5px",background:sc(item.status),flexShrink:0}} />
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:"13px",color:"#fff"}}>{item.ingredient}{item.allergen&&<span style={{marginLeft:"6px",fontSize:"10px",padding:"2px 6px",background:`${sc(item.status)}22`,borderRadius:"4px",color:sc(item.status)}}>{item.allergen}</span>}</div>
                <div style={{fontSize:"11px",color:S.mut,marginTop:"1px"}}>{item.reason}</div>
              </div>
            </div>
          ))}

          {/* Safe alternatives suggestion */}
          {(res.overall==="danger"||res.overall==="caution")&&(()=>{
            const alts = getSafeAlternatives(resLabel);
            return alts.products.length>0&&(
              <div style={{marginTop:"12px",padding:"14px",borderRadius:"12px",background:"rgba(139,92,246,0.06)",border:"1px solid rgba(139,92,246,0.15)"}}>
                <div style={{fontSize:"11px",color:S.p,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"8px"}}>✨ Try These Instead</div>
                <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                  {alts.products.map(p=>(
                    <button key={p.name} onClick={()=>doScan(p.ing,p.name)} style={{padding:"10px 12px",background:"rgba(34,197,94,0.06)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:"8px",cursor:"pointer",fontFamily:S.f,color:"#e8e6f0",textAlign:"left",display:"flex",alignItems:"center",gap:"8px",width:"100%"}}>
                      <span style={{fontSize:"18px"}}>{p.icon}</span>
                      <div style={{flex:1}}><div style={{fontWeight:600,fontSize:"12px",color:"#fff"}}>{p.name}</div><div style={{fontSize:"10px",color:S.g}}>✓ Safe for you</div></div>
                      <span style={{color:S.mut,fontSize:"12px"}}>Scan →</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* Share text display */}
          {shareText&&<div style={{marginTop:"12px",padding:"12px",borderRadius:"10px",background:"rgba(34,197,94,0.06)",border:"1px solid rgba(34,197,94,0.15)"}}>
            <div style={{fontSize:"11px",color:S.g,fontWeight:600,marginBottom:"4px"}}>✓ Copied to clipboard!</div>
            <div style={{fontSize:"10px",color:S.mut,whiteSpace:"pre-wrap",maxHeight:"80px",overflow:"auto"}}>{shareText}</div>
          </div>}

          {res.items.filter(i=>i.status==="safe").length>0&&(
            <details style={{marginTop:"10px"}}><summary style={{fontSize:"12px",color:S.mut,cursor:"pointer"}}><span style={{color:S.g}}>▸</span> Safe ({res.items.filter(i=>i.status==="safe").length})</summary>
              <div style={{marginTop:"6px"}}>{res.items.filter(i=>i.status==="safe").map((item,i)=>(
                <div key={i} style={{padding:"7px 14px",marginBottom:"2px",borderRadius:"8px",background:"rgba(34,197,94,0.03)",fontSize:"12px",color:"rgba(255,255,255,0.4)",display:"flex",alignItems:"center",gap:"8px"}}><span style={{color:S.g}}>✓</span>{item.ingredient}</div>
              ))}</div>
            </details>
          )}
        </div>}

        {/* ═══ DINING ═══ */}
        {pg==="dining"&&!viewChain&&<div>
          <h1 style={{fontFamily:S.sf,fontSize:"24px",fontWeight:800,color:"#fff",margin:"0 0 4px"}}>Dining Guide</h1>
          <p style={{color:S.mut,fontSize:"13px",marginBottom:"16px",lineHeight:1.5}}>Search any US location to find real nearby restaurants with menus filtered by your allergens.</p>
          <div style={{position:"relative",marginBottom:"16px"}}>
            <div style={{display:"flex",gap:"8px"}}>
              <input value={locInput} onChange={e=>{setLocInput(e.target.value);setShowSuggestions(true);setLocError("");if(locSet)setLocSet("");}} onFocus={()=>{if(!locSet)setShowSuggestions(true);}} placeholder="City, address, or zip code" onKeyDown={e=>{if(e.key==="Enter"){searchLocation();setShowSuggestions(false);}}} disabled={locLoading}
                style={{flex:1,padding:"12px 14px",background:"rgba(255,255,255,0.05)",border:`1.5px solid ${locError?S.r:S.brd}`,borderRadius:"12px",color:"#fff",fontSize:"14px",fontFamily:S.f,outline:"none",boxSizing:"border-box",opacity:locLoading?0.5:1}} />
              <button onClick={()=>searchLocation()} disabled={!locInput.trim()||locLoading}
                style={{padding:"12px 18px",background:locInput.trim()&&!locLoading?"linear-gradient(135deg,#7c3aed,#6d28d9)":"rgba(255,255,255,0.05)",border:"none",borderRadius:"12px",color:locInput.trim()&&!locLoading?"#fff":"rgba(255,255,255,0.2)",fontWeight:700,cursor:locInput.trim()&&!locLoading?"pointer":"default",fontFamily:S.f,fontSize:"14px",whiteSpace:"nowrap"}}>
                {locLoading?"Searching...":"📍 Search"}
              </button>
            </div>
            {showSuggestions&&filteredCities.length>0&&(
              <div style={{position:"absolute",top:"52px",left:0,right:0,background:"#1a1d2e",border:`1px solid ${S.brd}`,borderRadius:"12px",overflow:"hidden",zIndex:50,boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>
                {filteredCities.map(c=>(
                  <button key={c.name} onClick={()=>searchLocation(c.name)} style={{width:"100%",padding:"12px 16px",background:"transparent",border:"none",borderBottom:`1px solid ${S.brd}`,color:"#e8e6f0",fontSize:"14px",fontFamily:S.f,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{color:S.p}}>📍</span>{c.name}
                  </button>
                ))}
              </div>
            )}
          </div>
          {locError&&<div style={{marginTop:"-10px",marginBottom:"12px",padding:"10px 14px",borderRadius:"8px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",color:"#fca5a5",fontSize:"12px"}}>{locError}</div>}
          {locLoading&&<div style={{marginBottom:"12px",padding:"16px",borderRadius:"12px",background:S.card,border:`1px solid ${S.brd}`,textAlign:"center"}}>
            <div style={{fontSize:"14px",color:S.p,marginBottom:"4px"}}>Searching nearby restaurants...</div>
            <div style={{fontSize:"11px",color:S.mut}}>Checking OpenStreetMap for real locations</div>
          </div>}
          {locSet&&!locLoading&&<>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <div style={{fontSize:"12px",color:S.p,fontWeight:600}}>📍 Near "{locSet}" — {nearbyResults.length} locations {usingRealData&&<span style={{fontSize:"10px",color:S.g,marginLeft:"4px"}}>(live data)</span>}</div>
              <button onClick={()=>{setLocSet("");setNearbyResults([]);setLocInput("");setShowSuggestions(false);setLocError("");setUsingRealData(false);}} style={{background:"none",border:"none",color:S.mut,fontSize:"11px",cursor:"pointer",fontFamily:S.f}}>Clear</button>
            </div>
            {nearbyResults.map(nr=>{
              const {safe,danger,pct}=chainScore(nr);
              const color=pct>=70?S.g:pct>=40?S.y:S.r;
              return(<button key={nr.locId} onClick={()=>{setViewChain(nr);nav("chain",true);}} style={{padding:"14px 16px",marginBottom:"6px",borderRadius:"14px",background:S.card,border:`1px solid ${color}22`,cursor:"pointer",fontFamily:S.f,color:"#e8e6f0",textAlign:"left",width:"100%",display:"flex",alignItems:"center",gap:"12px"}}>
                <span style={{fontSize:"26px"}}>{nr.icon}</span>
                <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:"14px",color:"#fff"}}>{nr.name}</div><div style={{fontSize:"11px",color:S.mut,marginTop:"1px"}}>{nr.address} · {nr.distance} mi</div><div style={{fontSize:"10px",color:S.mut}}>{safe} safe · {danger} allergens</div></div>
                <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:"18px",fontWeight:800,fontFamily:S.sf,color}}>{pct}%</div><div style={{fontSize:"9px",color,fontWeight:600,textTransform:"uppercase"}}>safe</div></div>
              </button>);
            })}
          </>}
          {!locSet&&!locLoading&&<>
            <div style={{padding:"24px",borderRadius:"16px",background:S.card,border:`1px solid ${S.brd}`,textAlign:"center",marginBottom:"20px"}}>
              <div style={{fontSize:"40px",marginBottom:"8px"}}>📍</div>
              <div style={{fontSize:"14px",color:"rgba(255,255,255,0.5)",lineHeight:1.5}}>Search any city, address, or zip code to find real restaurants near you</div>
            </div>
            <h3 style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>Or browse all chains</h3>
            {[...CHAINS].sort((a,b)=>chainScore(b).pct-chainScore(a).pct).map(ch=>{
              const {safe,danger,pct}=chainScore(ch);const color=pct>=70?S.g:pct>=40?S.y:S.r;
              return(<button key={ch.id} onClick={()=>{setViewChain(ch);nav("chain",true);}} style={{padding:"12px 14px",marginBottom:"4px",borderRadius:"12px",background:S.card,border:`1px solid ${color}22`,cursor:"pointer",fontFamily:S.f,color:"#e8e6f0",textAlign:"left",width:"100%",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"24px"}}>{ch.icon}</span><div style={{flex:1}}><div style={{fontWeight:600,fontSize:"13px",color:"#fff"}}>{ch.name}</div><div style={{fontSize:"10px",color:S.mut}}>{safe} safe · {danger} allergens</div></div>
                <div style={{fontSize:"16px",fontWeight:800,fontFamily:S.sf,color}}>{pct}%</div>
              </button>);
            })}
          </>}
        </div>}

        {/* ═══ CHAIN DETAIL ═══ */}
        {pg==="chain"&&viewChain&&<div>
          <button onClick={()=>nav("dining")} style={{background:"none",border:"none",color:S.p,fontSize:"13px",cursor:"pointer",fontFamily:S.f,padding:"0 0 12px"}}>← Back</button>
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px"}}>
            <span style={{fontSize:"36px"}}>{viewChain.icon}</span>

            </div>
          </div>
          {viewChain.menu.filter(m=>!m.a.some(a=>prof.allergens.includes(a))).length>0&&<>
            <h3 style={{fontSize:"11px",color:S.g,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>✓ Safe for You ({viewChain.menu.filter(m=>!m.a.some(a=>prof.allergens.includes(a))).length})</h3>
            {viewChain.menu.filter(m=>!m.a.some(a=>prof.allergens.includes(a))).map((m,i)=>(
              <div key={i} style={{padding:"12px 14px",marginBottom:"4px",borderRadius:"10px",background:"rgba(34,197,94,0.06)",border:"1px solid rgba(34,197,94,0.15)",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{color:S.g,fontSize:"14px"}}>✓</span>
                <div><div style={{fontWeight:600,fontSize:"13px",color:"#fff"}}>{m.name}</div>{m.a.length>0?<div style={{fontSize:"10px",color:S.mut,marginTop:"1px"}}>Contains: {m.a.map(a=>AL.find(x=>x.id===a)?.label).join(", ")}</div>:<div style={{fontSize:"10px",color:"rgba(34,197,94,0.6)",marginTop:"1px"}}>No common allergens</div>}</div>
              </div>
            ))}
          </>}
          {viewChain.menu.filter(m=>m.a.some(a=>prof.allergens.includes(a))).length>0&&<>
            <h3 style={{fontSize:"11px",color:S.r,textTransform:"uppercase",letterSpacing:"1px",margin:"16px 0 8px"}}>✕ Contains Your Allergens ({viewChain.menu.filter(m=>m.a.some(a=>prof.allergens.includes(a))).length})</h3>
            {viewChain.menu.filter(m=>m.a.some(a=>prof.allergens.includes(a))).map((m,i)=>{
              const hits=m.a.filter(a=>prof.allergens.includes(a));
              return(<div key={i} style={{padding:"12px 14px",marginBottom:"4px",borderRadius:"10px",background:"rgba(239,68,68,0.05)",border:"1px solid rgba(239,68,68,0.12)",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{color:S.r,fontSize:"14px"}}>✕</span>
                <div><div style={{fontWeight:600,fontSize:"13px",color:"rgba(255,255,255,0.6)"}}>{m.name}</div>
                <div style={{fontSize:"10px",color:S.mut,marginTop:"1px"}}>{hits.map(a=><span key={a} style={{marginRight:"6px",padding:"1px 5px",background:"rgba(239,68,68,0.15)",borderRadius:"3px",color:"#fca5a5",fontSize:"9px"}}>{AL.find(x=>x.id===a)?.icon} {AL.find(x=>x.id===a)?.label}</span>)}</div></div>
              </div>);
            })}
          </>}
        </div>}

        {/* ═══ PROFILE ═══ */}
        {pg==="profile"&&<div>
          <h1 style={{fontFamily:S.sf,fontSize:"24px",fontWeight:800,color:"#fff",margin:"0 0 14px"}}>Your Profile</h1>
          <div style={{padding:"20px",borderRadius:"16px",background:S.card,border:`1px solid ${S.brd}`,marginBottom:"14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"14px"}}>
              <div style={{width:"48px",height:"48px",borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",fontWeight:700,color:"#fff"}}>{prof.name.charAt(0).toUpperCase()}</div>
              <div><div style={{fontWeight:700,fontSize:"18px",color:"#fff"}}>{prof.name}</div><div style={{fontSize:"11px",color:S.mut}}>@{currentUser} · Since {new Date(prof.createdAt).toLocaleDateString()}</div></div>
            </div>

            {/* Allergens - editable */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
              <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px"}}>Allergens</div>
              {!editingAllergens?
                <button onClick={()=>{setEditAllergens([...prof.allergens]);setEditingAllergens(true);}} style={{background:"none",border:"none",color:S.p,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:600}}>Edit</button>:
                <div style={{display:"flex",gap:"8px"}}>
                  <button onClick={()=>setEditingAllergens(false)} style={{background:"none",border:"none",color:S.mut,fontSize:"12px",cursor:"pointer",fontFamily:S.f}}>Cancel</button>
                  <button onClick={saveAllergenEdits} disabled={editAllergens.length===0} style={{background:"none",border:"none",color:editAllergens.length===0?S.mut:S.g,fontSize:"12px",cursor:editAllergens.length===0?"default":"pointer",fontFamily:S.f,fontWeight:600}}>Save{editAllergens.length===0?" (select 1+)":""}</button>
                </div>
              }
            </div>
            {!editingAllergens?
              <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{prof.allergens.map(id=>{const a=AL.find(x=>x.id===id);return <span key={id} style={{padding:"5px 10px",background:S.pbg,border:"1px solid rgba(139,92,246,0.3)",borderRadius:"8px",fontSize:"11px",color:"#c4b5fd"}}>{a?.icon} {a?.label}</span>;})}</div>:
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px"}}>
                {AL.map(a=>{const sel=editAllergens.includes(a.id);return(
                  <button key={a.id} onClick={()=>setEditAllergens(p=>sel?p.filter(x=>x!==a.id):[...p,a.id])}
                    style={{padding:"8px",background:sel?S.pbg:S.card,border:sel?"1.5px solid rgba(139,92,246,0.5)":`1.5px solid ${S.brd}`,borderRadius:"8px",cursor:"pointer",display:"flex",alignItems:"center",gap:"6px",fontFamily:S.f,color:sel?"#c4b5fd":"rgba(255,255,255,0.4)",fontSize:"11px"}}>
                    <span style={{fontSize:"16px"}}>{a.icon}</span>{a.label}{sel&&<span style={{marginLeft:"auto",color:S.p}}>✓</span>}
                  </button>
                );})}
              </div>
            }
          </div>

          {/* Stats */}
          <div style={{padding:"20px",borderRadius:"16px",background:S.card,border:`1px solid ${S.brd}`,marginBottom:"14px"}}>
            <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"10px"}}>Statistics</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
              {[{l:"Total Scans",v:hist.length,c:"#fff"},{l:"Safe",v:hist.filter(h=>h.overall==="safe").length,c:S.g},{l:"Danger",v:hist.filter(h=>h.overall==="danger").length,c:S.r},{l:"Caution",v:hist.filter(h=>h.overall!=="safe"&&h.overall!=="danger").length,c:S.y}].map(s=>(
                <div key={s.l}><span style={{fontSize:"22px",fontWeight:800,fontFamily:S.sf,color:s.c}}>{s.v}</span><div style={{fontSize:"10px",color:S.mut}}>{s.l}</div></div>
              ))}
            </div>
          </div>

          {/* Emergency Allergen Card */}
          <div style={{padding:"20px",borderRadius:"16px",background:"linear-gradient(135deg, rgba(239,68,68,0.08), rgba(245,158,11,0.06))",border:"1px solid rgba(239,68,68,0.15)",marginBottom:"14px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
              <div style={{fontSize:"11px",color:S.r,textTransform:"uppercase",letterSpacing:"1px",fontWeight:600}}>🚨 Emergency Allergen Card</div>
              <button onClick={()=>{setShowEmergencyEdit(!showEmergencyEdit);if(!showEmergencyEdit){setEmergencyContact(prof.emergencyContact||"");setEmergencyPhone(prof.emergencyPhone||"");}}} style={{background:"none",border:"none",color:S.p,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:600}}>{showEmergencyEdit?"Cancel":"Edit"}</button>
            </div>
            {showEmergencyEdit?(
              <div>
                <label style={{fontSize:"11px",color:S.mut,display:"block",marginBottom:"4px"}}>Emergency Contact Name</label>
                <input value={emergencyContact} onChange={e=>setEmergencyContact(e.target.value)} placeholder="e.g. Mom, Dr. Smith"
                  style={{width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.05)",border:`1px solid ${S.brd}`,borderRadius:"8px",color:"#fff",fontSize:"13px",fontFamily:S.f,outline:"none",boxSizing:"border-box",marginBottom:"10px"}} />
                <label style={{fontSize:"11px",color:S.mut,display:"block",marginBottom:"4px"}}>Emergency Phone</label>
                <input value={emergencyPhone} onChange={e=>setEmergencyPhone(e.target.value)} placeholder="(555) 123-4567"
                  style={{width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.05)",border:`1px solid ${S.brd}`,borderRadius:"8px",color:"#fff",fontSize:"13px",fontFamily:S.f,outline:"none",boxSizing:"border-box",marginBottom:"10px"}} />
                <button onClick={saveEmergency} style={{width:"100%",padding:"10px",background:"linear-gradient(135deg,#22c55e,#16a34a)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>Save Emergency Info</button>
              </div>
            ):(
              <div>
                <div style={{padding:"14px",borderRadius:"12px",background:"rgba(0,0,0,0.2)",marginBottom:"8px"}}>
                  <div style={{fontSize:"16px",fontWeight:700,color:"#fff",marginBottom:"6px"}}>{prof.name}</div>
                  <div style={{fontSize:"12px",color:"rgba(255,255,255,0.6)",marginBottom:"8px"}}>I have the following food allergies:</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"10px"}}>
                    {prof.allergens.map(id=>{const a=AL.find(x=>x.id===id);return <span key={id} style={{padding:"4px 10px",background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:"6px",fontSize:"12px",color:"#fca5a5",fontWeight:600}}>{a?.icon} {a?.label}</span>;})}
                  </div>
                  {(prof.emergencyContact||prof.emergencyPhone)&&(
                    <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:"8px",marginTop:"4px"}}>
                      <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"4px"}}>Emergency Contact</div>
                      {prof.emergencyContact&&<div style={{fontSize:"13px",color:"#fff",fontWeight:600}}>{prof.emergencyContact}</div>}
                      {prof.emergencyPhone&&<div style={{fontSize:"13px",color:S.p}}>{prof.emergencyPhone}</div>}
                    </div>
                  )}
                  {!prof.emergencyContact&&!prof.emergencyPhone&&(
                    <div style={{fontSize:"11px",color:S.mut,fontStyle:"italic"}}>Tap Edit to add an emergency contact</div>
                  )}
                </div>
                <div style={{fontSize:"10px",color:S.mut,textAlign:"center"}}>Show this card to restaurant staff or anyone preparing your food</div>
              </div>
            )}
          </div>

          {/* Actions */}
          <button onClick={doLogout} style={{width:"100%",padding:"13px",marginBottom:"8px",background:"rgba(139,92,246,0.08)",border:"1px solid rgba(139,92,246,0.2)",borderRadius:"12px",color:S.p,fontSize:"14px",fontWeight:600,cursor:"pointer",fontFamily:S.f}}>
            Log Out
          </button>
          {!confirmDelete?
            <button onClick={()=>setConfirmDelete(true)} style={{width:"100%",padding:"13px",background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:"12px",color:"#fca5a5",fontSize:"13px",fontWeight:600,cursor:"pointer",fontFamily:S.f}}>
              Delete Account
            </button>:
            <div style={{padding:"16px",borderRadius:"12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)"}}>
              <div style={{fontSize:"13px",color:"#fca5a5",marginBottom:"10px"}}>Are you sure? This permanently deletes your account, allergens, and scan history.</div>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>setConfirmDelete(false)} style={{flex:1,padding:"10px",background:"rgba(255,255,255,0.05)",border:`1px solid ${S.brd}`,borderRadius:"8px",color:S.mut,fontSize:"13px",cursor:"pointer",fontFamily:S.f}}>Cancel</button>
                <button onClick={doDeleteAccount} style={{flex:1,padding:"10px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"8px",color:"#fca5a5",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>Yes, Delete</button>
              </div>
            </div>
          }
        </div>}
      </main>

      <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"6px 20px",background:"rgba(11,14,24,0.95)",borderTop:`1px solid ${S.brd}`,fontSize:"9px",color:"rgba(255,255,255,0.18)",textAlign:"center"}}>Easy Eats · Informational only · Always verify with manufacturer</div>
    </div>
  );
}

// ─── RENDER ───
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>

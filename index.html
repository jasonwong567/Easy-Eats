<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Easy Eats — Allergen Safety Assistant</title>
  <meta name="description" content="Your personal food allergen safety assistant. Scan ingredients, find safe restaurants, and manage your allergen profile.">
  <meta name="theme-color" content="#0b0e18">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0d16; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }

    /* Loading screen */
    .app-loader { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0d16; color: #fff; font-family: sans-serif; flex-direction: column; gap: 12px; }
    .app-loader .logo { width: 72px; height: 72px; border-radius: 22px; background: linear-gradient(135deg, #22c55e, #16a34a); display: flex; align-items: center; justify-content: center; font-size: 36px; animation: pulse 1.8s ease-in-out infinite; box-shadow: 0 8px 32px rgba(34,197,94,0.3); }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.06); opacity: 0.9; } }

    /* Global interactive states */
    button { transition: opacity 0.15s ease, transform 0.1s ease, background 0.15s ease, box-shadow 0.15s ease; }
    button:active:not(:disabled) { transform: scale(0.97); }
    input, textarea { transition: border-color 0.15s ease, box-shadow 0.15s ease; }
    input:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(139,92,246,0.15) !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    /* Placeholder */
    ::placeholder { color: rgba(255,255,255,0.25); }

    /* Details/summary */
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

    /* Desktop scaling */
    @media (min-width: 1440px) { #root { zoom: 1.05; } }
    @media (min-width: 1800px) { #root { zoom: 1.08; } }
  </style>
</head>
<body>
  <div id="root">
    <div class="app-loader">
      <div class="logo">🍽</div>
      <div style="color: rgba(255,255,255,0.5); font-size: 14px;">Loading Easy Eats...</div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

  <script type="text/babel">
const { useState, useEffect, useRef } = React;


// ─── CLOUDFLARE WORKER CONFIG ───
// After deploying your worker, replace this URL with your actual worker URL.
// Format: https://easy-eats-api.<YOUR_SUBDOMAIN>.workers.dev
const WORKER_URL = "https://easy-eats-api.jasonwong38927.workers.dev";

// Module-level refs so runScan (defined outside App) can access loaded data
const ALRef = { current: [] };
const FPRef = { current: [] };
const AMBRef = { current: [] };
const CITIESRef = { current: [] };

// ─── ANALYSIS ENGINE ───
// ua = array of allergen IDs, customAllergens = array of custom allergen strings
function runScan(text, ua, customAllergens) {
    const AL = ALRef.current.length ? ALRef.current : [];
    const FP = FPRef.current.length ? FPRef.current : [];
    const AMB = AMBRef.current.length ? AMBRef.current : [];
  const lower = text.toLowerCase();
  const raw = lower.replace(/\([^)]*\)/g, m => m.replace(/,/g, "§")).split(/[,;]/).map(s => s.replace(/§/g, ",").trim()).filter(s => s.length > 1);
  const items = []; const dSet = new Set(); const cSet = new Set();
  const custom = (customAllergens||[]).map(c => c.toLowerCase().trim()).filter(Boolean);
  raw.forEach(ing => {
    const c = ing.replace(/^\d+%?\s*(or less of:?\s*)?/i,"").replace(/[()]/g," ").replace(/\s+/g," ").trim();
    if (!c) return;
    let m = false;
    const sk = new Set();
    FP.forEach(r => { if (c.includes(r.p)) r.s.forEach(s => sk.add(s)); });
    // Check custom allergens first
    for (const cv of custom) {
      if (c.includes(cv)) {
        items.push({ingredient:c,status:"danger",allergen:cv,reason:`Contains "${cv}" — custom allergen`});
        dSet.add("custom:"+cv); m = true; break;
      }
    }
    if (!m) {
      for (const aid of ua) {
        if (sk.has(aid)) continue;
        const a = AL.find(x => x.id === aid);
        if (!a) continue;
        for (const v of a.v) {
          if (c.includes(v)) {
            items.push({ingredient:c,status:"danger",allergen:a.label,reason:v===c?`Direct ${a.label.toLowerCase()} allergen`:`Contains "${v}" — ${a.label.toLowerCase()} derivative`});
            dSet.add(aid); m = true; break;
          }
        }
        if (m) break;
      }
    }
    if (!m) {
      for (const amb of AMB) {
        if (c.includes(amb.p)) {
          const rel = amb.r.filter(a => ua.includes(a));
          if (rel.length > 0 || amb.r.length === 0) {
            items.push({ingredient:c,status:"caution",allergen:rel.map(a=>(AL.find(function(x){return x.id===a})||{}).label).filter(Boolean).join(", ")||"Cross-contamination",reason:amb.w});
            rel.forEach(a => cSet.add(a)); m = true; break;
          }
        }
      }
    }
    if (!m) items.push({ingredient:c,status:"safe",allergen:null,reason:"No match"});
  });
  let overall = "safe", summary = "";
  const dangerLabels = [...dSet].map(id => id.startsWith("custom:") ? id.replace("custom:","") : (AL.find(function(a){return a.id===id})||{}).label).filter(Boolean);
  if (dSet.size > 0) { overall = "danger"; summary = `Contains ${dangerLabels.join(", ")} allergens.`; }
  else if (cSet.size > 0) { overall = "caution"; summary = "Some ingredients may contain hidden allergen derivatives."; }
  else summary = "No allergens detected for your profile.";
  return { overall, items, summary };
}

// ─── FONTS ───
if (!document.querySelector('link[href*="DM+Sans"]')) {
  const fl = document.createElement("link");
  fl.href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,800&display=swap";
  fl.rel="stylesheet"; document.head.appendChild(fl);
}

const S = { f:"'DM Sans',sans-serif", sf:"'Fraunces',serif", bg:"#080b14", card:"rgba(255,255,255,0.06)", card2:"rgba(255,255,255,0.1)", brd:"rgba(255,255,255,0.09)", mut:"rgba(255,255,255,0.35)", g:"#22c55e", y:"#f59e0b", r:"#ef4444", p:"#a78bfa", pbg:"rgba(139,92,246,0.15)", shadow:"0 8px 32px rgba(0,0,0,0.5)", shadowSm:"0 2px 16px rgba(0,0,0,0.35)", cardBorder:"rgba(255,255,255,0.07)" };
const sc = s => s==="safe"?S.g:s==="caution"?S.y:S.r;
const sb = s => s==="safe"?"rgba(34,197,94,0.08)":s==="caution"?"rgba(245,158,11,0.08)":"rgba(239,68,68,0.08)";

// ─── MULTI-USER STORAGE ───
const USERS_KEY = "easyeats-users"; // stores {username: {password, name, allergens, history, createdAt}}
const SESSION_KEY = "easyeats-session"; // stores current username

function loadUsers() { try { const r = localStorage.getItem(USERS_KEY); return r ? JSON.parse(r) : {}; } catch(e) { return {}; } }
function saveUsers(users) { try { localStorage.setItem(USERS_KEY, JSON.stringify(users)); } catch(e) { console.error(e); } }
function loadSession() { try { return localStorage.getItem(SESSION_KEY); } catch(e) { return null; } }
function saveSession(username) { try { localStorage.setItem(SESSION_KEY, username); } catch(e) { console.error(e); } }
function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch(e) { console.error(e); } }

function App() {
  const [loaded, setLoaded] = useState(false);
  const [chains, setChains] = useState([]);
  const chainsRef = useRef([]);
  const [AL, setAL] = useState([]);
  const [FP, setFP] = useState([]);
  const [AMB, setAMB] = useState([]);
  const [CITIES, setCITIES] = useState([]);
  const [users, setUsers] = useState({});
  const usersRef = useRef(users);
  useEffect(() => { usersRef.current = users; }, [users]);
  const [currentUser, setCurrentUser] = useState(null);
  const [prof, setProf] = useState(null);

  // Auth state
  const [authMode, setAuthMode] = useState("login"); // login, signup, setupAllergens
  const [authUser, setAuthUser] = useState("");
  const [authPass, setAuthPass] = useState("");
  const [authName, setAuthName] = useState("");
  const [authAllergens, setAuthAllergens] = useState([]);
  const [authCustom, setAuthCustom] = useState("");
  const [authCustomList, setAuthCustomList] = useState([]);
  const [authError, setAuthError] = useState("");
  const [showPass, setShowPass] = useState(false);

  // App state
  const [pg, setPg] = useState("home");
  const [txt, setTxt] = useState("");
  const [res, setRes] = useState(null);
  const [resLabel, setResLabel] = useState("");
  const [resultStack, setResultStack] = useState([]); // stack of {res, label, fromPage}
  const [viewChain, setViewChain] = useState(null);
  const [viewHist, setViewHist] = useState(null);
  const [fade, setFade] = useState(true);
  const [locInput, setLocInput] = useState("");
  const [locSet, setLocSet] = useState("");
  const [nearbyResults, setNearbyResults] = useState([]);
  const [editingAllergens, setEditingAllergens] = useState(false);
  const [editAllergens, setEditAllergens] = useState([]);
  const [editCustomList, setEditCustomList] = useState([]);
  const [editCustomInput, setEditCustomInput] = useState("");
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [emergencyContact, setEmergencyContact] = useState("");
  const [emergencyPhone, setEmergencyPhone] = useState("");
  const [showEmergencyEdit, setShowEmergencyEdit] = useState(false);
  const [photoPreview, setPhotoPreview] = useState(null);
  const [ocrLoading, setOcrLoading] = useState(false);
  const [ocrBad, setOcrBad] = useState(false);
  const [ocrError, setOcrError] = useState("");
  const [barcodeScanning, setBarcodeScanning] = useState(false);
  const [barcodeLoading, setBarcodeLoading] = useState(false);
  const [barcodeError, setBarcodeError] = useState("");
  const barcodeReaderRef = useRef(null);
  const [photoLabel, setPhotoLabel] = useState("");
  const [scannerTab, setScannerTab] = useState("search");
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    if (pg !== "scanner") stopBarcodeScanner();
  }, [pg]);

  // Food search state (Edamam via Cloudflare Worker)
  const [foodQuery, setFoodQuery] = useState("");
  const [foodResults, setFoodResults] = useState([]);
  const [foodLoading, setFoodLoading] = useState(false);
  const [foodError, setFoodError] = useState("");
  const [foodNoIngredients, setFoodNoIngredients] = useState("");

  // Nutrition tab state
  const [nutQuery, setNutQuery] = useState("");
  const [nutResults, setNutResults] = useState([]);
  const [nutLoading, setNutLoading] = useState(false);
  const [nutError, setNutError] = useState("");
  const [nutSelected, setNutSelected] = useState(null);
  const [nutDetail, setNutDetail] = useState(null);
  const [nutDetailLoading, setNutDetailLoading] = useState(false);

  // Map state
  const [mapCenter, setMapCenter] = useState(null);
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);

  // Load on mount
  useEffect(() => {
    (() => {
      const u = loadUsers();
      setUsers(u);
      const sess = loadSession();
      if (sess && u[sess]) {
        setCurrentUser(sess);
        setProf(u[sess]);
        setEmergencyContact(u[sess].emergencyContact||"");
        setEmergencyPhone(u[sess].emergencyPhone||"");
      }
      setLoaded(true);
    })();
  }, []);

  // Load external data files
  useEffect(() => {
    fetch("chains.json").then(r=>r.json()).then(data => { chainsRef.current = data; setChains(data); }).catch(()=>{});
    fetch("allergens.json").then(r=>r.json()).then(data => {
      ALRef.current = data.AL; setAL(data.AL);
      FPRef.current = data.FP; setFP(data.FP);
      AMBRef.current = data.AMB; setAMB(data.AMB);
    }).catch(()=>{});
    fetch("cities.json").then(r=>r.json()).then(data => { CITIESRef.current = data; setCITIES(data); }).catch(()=>{});
  }, []);

  // Save user profile - use refs to avoid stale closures
  const profRef = useRef(prof);
  useEffect(() => { profRef.current = prof; }, [prof]);
  const currentUserRef = useRef(currentUser);
  useEffect(() => { currentUserRef.current = currentUser; }, [currentUser]);

  const saveProf = (updates) => {
    const cur = currentUserRef.current;
    if (!cur) return;
    const newProf = { ...profRef.current, ...updates };
    setProf(newProf);
    const newUsers = { ...usersRef.current, [cur]: newProf };
    setUsers(newUsers);
    saveUsers(newUsers);
  };

  // Auth actions
  const doLogin = () => {
    setAuthError("");
    const u = authUser.trim().toLowerCase();
    const p = authPass;
    const cur = usersRef.current;
    if (!u || !p) { setAuthError("Enter username and password."); return; }
    if (!cur[u]) { setAuthError("Account not found. Sign up instead?"); return; }
    if (cur[u].password !== p) { setAuthError("Incorrect password."); return; }
    saveSession(u);
    setCurrentUser(u);
    setProf(cur[u]);
    setEmergencyContact(cur[u].emergencyContact||"");
    setEmergencyPhone(cur[u].emergencyPhone||"");
    setAuthUser(""); setAuthPass(""); setAuthError("");
    setPg("home");
  };

  const doSignup = () => {
    setAuthError("");
    const u = authUser.trim().toLowerCase();
    const p = authPass;
    const n = authName.trim();
    if (!u) { setAuthError("Choose a username."); return; }
    if (u.length < 3) { setAuthError("Username must be at least 3 characters."); return; }
    if (/[^a-z0-9_]/.test(u)) { setAuthError("Username can only have letters, numbers, and underscores."); return; }
    if (!p) { setAuthError("Choose a password."); return; }
    if (p.length < 4) { setAuthError("Password must be at least 4 characters."); return; }
    if (!n) { setAuthError("Enter your name."); return; }
    if (usersRef.current[u]) { setAuthError(`Username "${u}" is already taken.`); return; }
    setAuthMode("setupAllergens");
    setAuthError("");
  };

  const finishSignup = () => {
    if (authAllergens.length === 0 && authCustomList.length === 0) { setAuthError("Select at least one allergen."); return; }
    const u = authUser.trim().toLowerCase();
    const newProf = { password: authPass, name: authName.trim(), allergens: authAllergens, customAllergens: authCustomList, history: [], createdAt: new Date().toISOString() };
    const newUsers = { ...usersRef.current, [u]: newProf };
    setUsers(newUsers);
    setCurrentUser(u);
    setProf(newProf);
    saveUsers(newUsers);
    saveSession(u);
    setAuthUser(""); setAuthPass(""); setAuthName(""); setAuthAllergens([]); setAuthCustomList([]); setAuthCustom(""); setAuthError("");
    setPg("home");
  };

  const doLogout = () => {
    clearSession();
    setCurrentUser(null);
    setProf(null);
    setPg("home");
    setAuthMode("login");
    setAuthUser(""); setAuthPass(""); setAuthName(""); setAuthError("");
    setEditingAllergens(false); setConfirmDelete(false);
    setShowEmergencyEdit(false); setEmergencyContact(""); setEmergencyPhone("");
    setPhotoPreview(null); setResultStack([]);
  };

  const doDeleteAccount = () => {
    if (!currentUser) return;
    const newUsers = { ...usersRef.current };
    delete newUsers[currentUser];
    setUsers(newUsers);
    saveUsers(newUsers);
    clearSession();
    setCurrentUser(null); setProf(null); setPg("home"); setAuthMode("login");
    setConfirmDelete(false);
  };

  const saveAllergenEdits = () => {
    if (editAllergens.length === 0 && editCustomList.length === 0) { return; }
    const newProf = { ...prof, allergens: editAllergens, customAllergens: editCustomList };
    const newUsers = { ...usersRef.current, [currentUser]: newProf };
    setProf(newProf);
    setUsers(newUsers);
    saveUsers(newUsers);
    setEditingAllergens(false);
  };

  // Nav
  const nav = (p, keepState) => { setFade(false); setTimeout(() => { setPg(p); setFade(true); if (!keepState) { setRes(null); setViewChain(null); setViewHist(null); setResultStack([]); } }, 120); };

  const doScan = (text, label, fromPage) => {
    if (!prof) return;
    if (!text || !text.trim()) return;
    const r = runScan(text, prof.allergens, prof.customAllergens);
    const autoLabel = label || text.trim().split(/[,;]/)[0].replace(/\([^)]*\)/g,"").trim().slice(0,50);
    const entry = { id: Date.now(), label: autoLabel, date: new Date().toISOString(), ingredients: text, overall: r.overall, dc: r.items.filter(i=>i.status==="danger").length, cc: r.items.filter(i=>i.status==="caution").length, sc: r.items.filter(i=>i.status==="safe").length, items: r.items, summary: r.summary };
    saveProf({ history: [entry, ...(prof.history||[])].slice(0,50) });
    // Push current result to stack if we're already on results
    if (pg === "results" && res) {
      setResultStack(prev => [...prev, { res, label: resLabel, fromPage: "results" }]);
    } else if (pg === "histDetail" && viewHist) {
      setResultStack(prev => [...prev, { res: { overall: viewHist.overall, items: viewHist.items, summary: viewHist.summary }, label: viewHist.label, fromPage: "histDetail" }]);
    } else {
      setResultStack([{ res: null, label: "", fromPage: fromPage || pg }]);
    }
    setRes({...r, scannedText: text}); setResLabel(autoLabel); nav("results", true);
  };

  // Re-run scan against current allergens so history stays accurate after profile changes
  const liveResult = (h) => {
    if (h.ingredients && prof && prof.allergens) {
      const r = runScan(h.ingredients, prof.allergens, prof.customAllergens);
      return { overall: r.overall, items: r.items, summary: r.summary, dc: r.items.filter(i=>i.status==="danger").length, cc: r.items.filter(i=>i.status==="caution").length, sc: r.items.filter(i=>i.status==="safe").length };
    }
    return { overall: h.overall, items: h.items||[], summary: h.summary, dc: h.dc||0, cc: h.cc||0, sc: h.sc||0 };
  };

  const goBackFromResults = () => {
    const stack = [...resultStack];
    const prev = stack.pop();
    setResultStack(stack);
    if (prev && prev.res && prev.fromPage === "results") {
      setRes(prev.res); setResLabel(prev.label);
    } else if (prev && prev.fromPage === "histDetail") {
      nav("histDetail", true);
    } else {
      const dest = (prev && prev.fromPage) || "scanner";
      nav(["scanner","nutrition","dining","home","histDetail"].includes(dest) ? dest : "scanner");
    }
  };

  const chainScore = (chain) => {
    if (!(prof&&prof.allergens&&prof.allergens.length)) return {safe:0,danger:0,pct:0};
    let safe=0,danger=0;
    chain.menu.forEach(item => { if (item.a.some(a => prof.allergens.includes(a))) danger++; else safe++; });
    return {safe,danger,pct:Math.round((safe/chain.menu.length)*100)};
  };


  const filteredCities = locInput.trim().length > 0 ? (CITIESRef.current.length ? CITIESRef.current : CITIES).filter(c => c.name.toLowerCase().includes(locInput.toLowerCase())).slice(0,6) : [];
  const generateNearby = (cityName) => {
    const citiesList = CITIESRef.current.length ? CITIESRef.current : CITIES;
    const city = citiesList.find(c => c.name.toLowerCase() === cityName.toLowerCase());
    const GEN = ["Main St","Broadway","Center St","Market St","Elm St","Park Ave","Oak Dr","Highland Ave","Washington St","Maple Ave","1st Ave","2nd Ave","Mill Rd","Church St","Pine St"];
    const streets = city ? city.st : GEN;
    const display = city ? city.name : cityName;
    const seed = cityName.toLowerCase().split("").reduce((a,c,i) => a + c.charCodeAt(0) * (i+1), 0);
    const results = [];
    const chainList = chainsRef.current.length ? chainsRef.current : chains;
    chainList.forEach((chain, ci) => {
      const n = 2 + ((seed + ci * 7) % 4); // 2–5 locations per chain
      for (let j = 0; j < n; j++) {
        results.push({ ...chain, locId: `${chain.id}-${display}-${j}`, address: `${10+((seed*2+ci*17+j*43)%490)*2} ${streets[(seed*3+ci*13+j*31)%streets.length]}, ${display}`, distance: parseFloat((0.2+((seed*5+ci*11+j*29)%95)/10).toFixed(1)) });
      }
    });
    return results.sort((a,b) => a.distance - b.distance).filter(r => r.distance <= 10);
  };

  // ─── OPENSTREETMAP INTEGRATION ───
  const [locError, setLocError] = useState("");
  const [locLoading, setLocLoading] = useState(false);
  const [usingRealData, setUsingRealData] = useState(false);

  // Haversine distance in miles
  const haversine = (lat1, lon1, lat2, lon2) => {
    const R = 3959;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.pow(Math.sin(dLat/2),2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.pow(Math.sin(dLon/2),2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  };

  // Map OSM names to our chain database
  const matchChain = (osmName) => {
    if (!osmName) return null;
    const n = osmName.toLowerCase().replace(/['''\u2018\u2019]/g,"").replace(/\s+/g," ").trim();
    const chainList = chainsRef.current.length ? chainsRef.current : chains;
    return chainList.find(ch => {
      const cn = ch.name.toLowerCase().replace(/['''\u2018\u2019]/g,"").replace(/\s+/g," ").trim();
      if (n === cn || n.includes(cn) || cn.includes(n)) return true;
      // Common OSM name variants
      const aliases = {
        "mcdonalds":    ["mcdonald"],
        "chickfila":    ["chick-fil", "chickfil", "chick fil"],
        "dunkin":       ["dunkin"],
        "wendys":       ["wendy"],
        "arbys":        ["arby"],
        "dennys":       ["denny"],
        "dominos":      ["domino"],
        "applebees":    ["applebee"],
        "papa johns":   ["papa john"],
        "popeyes":      ["popeye"],
        "dairy queen":  ["dairy queen","dq"],
        "starbucks":    ["starbuck"],
        "subway":       ["subway"],
        "taco bell":    ["taco bell"],
        "burger king":  ["burger king"],
        "pizza hut":    ["pizza hut"],
        "kfc":          ["kfc","kentucky fried"],
        "panera bread": ["panera"],
        "chipotle":     ["chipotle"],
        "five guys":    ["five guys","5 guys"],

  const searchWithOSM = async (locationName) => {
    try {
      // Step 1: Geocode location with Nominatim
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationName)}&limit=1&countrycodes=us`, {
        headers: { "User-Agent": "EasyEats/1.0" }
      });
      const geoData = await geoRes.json();
      if (!geoData.length) return null;

      const lat = parseFloat(geoData[0].lat);
      const lon = parseFloat(geoData[0].lon);
      const displayName = geoData[0].display_name.split(",").slice(0,2).join(",").trim();

      // Step 2: Query Overpass for restaurants/fast food within ~10 miles (16km)
      const overpassQuery = `[out:json][timeout:30];(node["amenity"="fast_food"](around:16000,${lat},${lon});node["amenity"="restaurant"](around:16000,${lat},${lon});node["amenity"="cafe"](around:16000,${lat},${lon});node["amenity"="ice_cream"](around:16000,${lat},${lon});node["amenity"="food_court"](around:16000,${lat},${lon}););out body 2000;`;
      const overpassRes = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`);
      const overpassData = await overpassRes.json();

      if (!(overpassData.elements&&overpassData.elements.length)) return { results: [], displayName, center: [lat, lon] };

      // Step 3: Match OSM results to our chain database
      const results = [];
      const seen = new Set(); // avoid duplicate locations
      overpassData.elements.forEach(el => {
        const name = (el.tags&&el.tags.name);
        const chain = matchChain(name);
        if (!chain) return;
        
        const dist = haversine(lat, lon, el.lat, el.lon);
        if (dist > 10) return;
        
        // Build address from OSM tags
        const street = (el.tags&&el.tags["addr:street"]) || "";
        const houseNum = (el.tags&&el.tags["addr:housenumber"]) || "";
        const city = (el.tags&&el.tags["addr:city"]) || displayName;
        const addr = houseNum && street ? `${houseNum} ${street}, ${city}` : street ? `${street}, ${city}` : city;
        
        const locKey = `${chain.id}-${el.id}`;
        if (seen.has(locKey)) return;
        seen.add(locKey);

        results.push({
          ...chain,
          locId: locKey,
          address: addr,
          distance: parseFloat(dist.toFixed(1)),
          osmId: el.id,
          lat: el.lat,
          lon: el.lon,
        });
      });

      return { results: results.sort((a,b) => a.distance - b.distance), displayName, center: [lat, lon] };
    } catch (e) {
      return null;
    }
  };

    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      // Convert any format (including HEIC) to JPEG via canvas
      const toJpeg = (src) => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          canvas.getContext("2d").drawImage(img, 0, 0);
          resolve(canvas.toDataURL("image/jpeg", 0.92));
        };
        img.onerror = () => resolve(src); // fallback to original
        img.src = src;
      });
      const dataUrl = await toJpeg(ev.target.result);
      setPhotoPreview(dataUrl);
      setOcrLoading(true);
      setOcrBad(false);
      setOcrError("");
      setTxt("");
      setPhotoLabel("");
      try {
        const base64 = dataUrl.split(",")[1];
        const resp = await fetch(`${WORKER_URL}/api/ocr`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: base64, mediaType: "image/jpeg" }),
        });
        const data = await resp.json();
        if (data.error || data.ingredients == null) {
          setOcrBad(true);
          setOcrError(data.error || "No ingredients found");
        } else {
          setTxt(data.ingredients);
          setPhotoLabel(data.name || "");
          setOcrBad(false);
        }
      } catch(err) {
        setOcrBad(true);
      }
      setOcrLoading(false);
    };
    reader.readAsDataURL(file);
  };

    lines.push("", `${result.items.filter(i=>i.status==="safe").length} ingredients checked safe`);
    const text = lines.join("\n");
    if (navigator.share) {
      try { await navigator.share({ title: `Easy Eats: ${label}`, text }); return; } catch(e) {}

    // Fallback: clipboard
    try {
      await navigator.clipboard.writeText(text);

      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position="fixed"; ta.style.left="-9999px";

              <input type={showPass?"text":"password"} value={authPass} onChange={e=>{setAuthPass(e.target.value);setAuthError("");}} placeholder={authMode==="login"?"Enter password":"Choose a password"} onKeyDown={e=>{if(e.key==="Enter"){authMode==="login"?doLogin():doSignup();}}}
                style={{width:"100%",padding:"12px 14px",paddingRight:"50px",background:"rgba(255,255,255,0.05)",border:`1.5px solid ${S.brd}`,borderRadius:"10px",color:"#fff",fontSize:"14px",fontFamily:S.f,outline:"none",boxSizing:"border-box"}} />
              <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:S.mut,fontSize:"12px",cursor:"pointer",fontFamily:S.f}}>{showPass?"Hide":"Show"}</button>
            </div>

            {authError&&<div style={{marginBottom:"12px",padding:"10px 14px",borderRadius:"8px",background:"rgba(239,68,68,0.1)",color:"#fca5a5",fontSize:"12px"}}>{authError}</div>}

            <button onClick={authMode==="login"?doLogin:doSignup}
              style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",border:"none",borderRadius:"12px",color:"#fff",fontSize:"15px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>
              {authMode==="login"?"Log In":"Continue →"}
            </button>

            <div style={{textAlign:"center",marginTop:"16px",fontSize:"13px",color:S.mut}}>
              {authMode==="login"?"Don't have an account? ":"Already have an account? "}
              <button onClick={()=>{setAuthMode(authMode==="login"?"signup":"login");setAuthError("");setAuthUser("");setAuthPass("");setAuthName("");}}
                style={{background:"none",border:"none",color:S.p,cursor:"pointer",fontFamily:S.f,fontSize:"13px",fontWeight:600}}>
                {authMode==="login"?"Sign Up":"Log In"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  // ─── MAIN APP ───
  const hist = (prof&&prof.history)||[];
  const NavBtn = ({id,icon,label}) => {
    const active = pg===id||(pg==="results"&&id==="scanner")||(pg==="chain"&&id==="dining")||(pg==="histDetail"&&id==="home");
    return (
      <button onClick={()=>nav(id)} style={{flex:1,padding:"8px 4px 4px",background:"transparent",border:"none",cursor:"pointer",fontFamily:S.f,display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",position:"relative"}}>
        {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:"24px",height:"2px",borderRadius:"0 0 2px 2px",background:"linear-gradient(90deg,#7c3aed,#a78bfa)"}} />}
        <div style={{width:"40px",height:"28px",borderRadius:"12px",background:active?"rgba(139,92,246,0.12)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",fontSize:"17px",filter:active?"none":"grayscale(0.2) opacity(0.6)"}}>{icon}</div>
        <span style={{fontSize:"10px",fontWeight:active?600:400,color:active?"#c4b5fd":S.mut,letterSpacing:"0.1px",transition:"color 0.2s"}}>{label}</span>
      </button>

  };

  return (
    <div style={{minHeight:"100vh",fontFamily:S.f,background:S.bg,color:"#e8e6f0",backgroundImage:"radial-gradient(ellipse 80% 50% at 50% -20%,rgba(139,92,246,0.08),transparent)"}}>
      <header style={{padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid rgba(255,255,255,0.07)`,background:"rgba(8,11,20,0.9)",backdropFilter:"blur(28px)",WebkitBackdropFilter:"blur(28px)",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:"9px",cursor:"pointer"}} onClick={()=>nav("home")}>
          <div style={{width:"32px",height:"32px",borderRadius:"10px",background:"linear-gradient(135deg,#22c55e,#16a34a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",boxShadow:"0 2px 12px rgba(34,197,94,0.3)",flexShrink:0}}>🍽</div>
          <span style={{fontFamily:S.sf,fontSize:"17px",fontWeight:800,color:"#fff",letterSpacing:"-0.4px"}}>Easy Eats</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <div style={{display:"flex",gap:"2px",padding:"4px 8px",background:"rgba(255,255,255,0.05)",borderRadius:"20px",border:`1px solid ${S.brd}`}}>{prof.allergens.slice(0,4).map(id=><span key={id} style={{fontSize:"13px"}}>{(AL.find(function(a){return a.id===id})||{}).icon}</span>)}{prof.allergens.length>4&&<span style={{fontSize:"9px",color:S.mut,alignSelf:"center",marginLeft:"2px"}}>+{prof.allergens.length-4}</span>}</div>
          <div onClick={()=>nav("profile")} style={{width:"30px",height:"30px",borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,color:"#fff",cursor:"pointer",boxShadow:"0 2px 12px rgba(124,58,237,0.35)"}}>{prof.name.charAt(0).toUpperCase()}</div>
        </div>
      </header>

      <main style={{padding:"22px 20px 100px",maxWidth:"600px",margin:"0 auto",opacity:fade?1:0,transition:"opacity 0.18s ease"}}>

        {/* ═══ HOME ═══ */}
        {pg==="home"&&<div>
          {/* Hero greeting */}
          <div style={{padding:"20px",borderRadius:"20px",background:"linear-gradient(135deg,rgba(124,58,237,0.18),rgba(139,92,246,0.08))",border:"1px solid rgba(139,92,246,0.2)",marginBottom:"16px",position:"relative",overflow:"hidden"}}>

            <div style={{fontSize:"11px",color:"rgba(167,139,250,0.8)",fontWeight:600,letterSpacing:"1px",textTransform:"uppercase",marginBottom:"6px"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
            <h1 style={{fontFamily:S.sf,fontSize:"24px",fontWeight:800,color:"#fff",margin:"0 0 4px",letterSpacing:"-0.4px"}}>Hello, {prof.name}</h1>
            <p style={{color:"rgba(255,255,255,0.5)",fontSize:"13px",margin:"0 0 14px"}}>Tracking {prof.allergens.length} allergen{prof.allergens.length!==1?"s":""}</p>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
              {prof.allergens.map(id=>{const a=AL.find(x=>x.id===id);return a?<span key={id} style={{padding:"3px 8px",background:"rgba(139,92,246,0.2)",border:"1px solid rgba(139,92,246,0.3)",borderRadius:"20px",fontSize:"11px",color:"#c4b5fd",fontWeight:500}}>{a.icon} {a.label}</span>:null;})}

          </div>

          {hist.length>0 ? <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"18px"}}>
              {[{l:"Total",v:hist.length,c:"#a78bfa",bg:"rgba(139,92,246,0.1)",bdr:"rgba(139,92,246,0.2)"},{l:"Safe",v:hist.filter(h=>liveResult(h).overall==="safe").length,c:S.g,bg:"rgba(34,197,94,0.08)",bdr:"rgba(34,197,94,0.18)"},{l:"Flagged",v:hist.filter(h=>liveResult(h).overall==="danger").length,c:S.r,bg:"rgba(239,68,68,0.08)",bdr:"rgba(239,68,68,0.18)"}].map(s=>(
                <div key={s.l} style={{padding:"14px 8px",borderRadius:"16px",background:s.bg,border:`1px solid ${s.bdr}`,textAlign:"center"}}>
                  <div style={{fontSize:"26px",fontWeight:800,fontFamily:S.sf,color:s.c,lineHeight:1,marginBottom:"3px"}}>{s.v}</div>
                  <div style={{fontSize:"10px",color:s.c,opacity:0.7,fontWeight:600,letterSpacing:"0.5px",textTransform:"uppercase"}}>{s.l}</div>

              <span style={{fontSize:"11px",color:S.mut}}>{hist.length} total</span>

              <button key={h.id} onClick={()=>{setViewHist(h);nav("histDetail",true);}} style={{padding:"12px 14px",marginBottom:"6px",background:S.card,border:`1px solid rgba(255,255,255,0.07)`,borderRadius:"14px",display:"flex",alignItems:"center",gap:"12px",cursor:"pointer",fontFamily:S.f,color:"#e8e6f0",textAlign:"left",width:"100%"}}>
                {(()=>{const lr=liveResult(h);const changed=h.ingredients&&lr.overall!==h.overall;const clr=sc(lr.overall);return(<>

                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:"13px",color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:"2px"}}>{h.label}</div>
                  <div style={{fontSize:"11px",color:S.mut,display:"flex",gap:"8px",alignItems:"center"}}><span>{new Date(h.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>{lr.dc>0&&<span style={{color:S.r}}>● {lr.dc} danger</span>}{lr.cc>0&&<span style={{color:S.y}}>● {lr.cc} caution</span>}</div>
                </div>
                {changed&&<span style={{fontSize:"9px",fontWeight:700,color:"#fcd34d",background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:"5px",padding:"2px 6px",flexShrink:0}}>RESCAN</span>}
                <span style={{color:"rgba(255,255,255,0.15)",fontSize:"14px",flexShrink:0}}>›</span>
                </>)})()}
              </button>
            ))}
          </> : (
            <div style={{textAlign:"center",padding:"48px 20px",background:"rgba(255,255,255,0.03)",borderRadius:"20px",border:`1px solid rgba(255,255,255,0.07)`}}>
              <div style={{width:"64px",height:"64px",borderRadius:"20px",background:"linear-gradient(135deg,rgba(124,58,237,0.3),rgba(139,92,246,0.15))",border:"1px solid rgba(139,92,246,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px",margin:"0 auto 16px"}}>🔬</div>
              <div style={{fontFamily:S.sf,fontSize:"20px",fontWeight:800,color:"#fff",marginBottom:"8px"}}>No scans yet</div>
              <div style={{fontSize:"13px",color:S.mut,lineHeight:1.6,marginBottom:"24px",maxWidth:"260px",margin:"0 auto 24px"}}>Take a photo of an ingredient label or search for a food to check it against your allergens.</div>
              <button onClick={()=>nav("scanner")} style={{padding:"13px 28px",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",border:"none",borderRadius:"14px",color:"#fff",fontSize:"14px",fontWeight:700,cursor:"pointer",fontFamily:S.f,boxShadow:"0 4px 24px rgba(124,58,237,0.4)"}}>Start Scanning</button>
            </div>
          )}
        </div>}

        {/* ═══ HIST DETAIL ═══ */}
        {pg==="histDetail"&&viewHist&&(()=>{const lr=liveResult(viewHist);const resultChanged=viewHist.ingredients&&lr.overall!==viewHist.overall;return(<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
            <button onClick={()=>nav("home")} style={{background:"none",border:"none",color:S.p,fontSize:"13px",cursor:"pointer",fontFamily:S.f,padding:0}}>← Back</button>
            <button onClick={()=>doScan(viewHist.ingredients||viewHist.label, viewHist.label)} style={{padding:"7px 14px",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",border:"none",borderRadius:"9px",color:"#fff",fontSize:"12px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>↺ Rescan</button>
          </div>
          <h2 style={{fontFamily:S.sf,fontSize:"22px",fontWeight:800,color:"#fff",margin:"0 0 4px"}}>{viewHist.label}</h2>
          <div style={{fontSize:"11px",color:S.mut,marginBottom:"8px"}}>{new Date(viewHist.date).toLocaleString()}</div>
          {resultChanged&&<div style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:"10px",padding:"9px 14px",marginBottom:"12px",fontSize:"12px",color:"#fcd34d"}}>⚠️ Result differs from original — allergen profile has changed</div>}
          <div style={{padding:"20px",borderRadius:"16px",marginBottom:"14px",background:sb(lr.overall),border:`1.5px solid ${sc(lr.overall)}33`,textAlign:"center"}}>
            <div style={{fontSize:"40px",marginBottom:"4px"}}>{lr.overall==="safe"?"✅":lr.overall==="caution"?"⚠️":"🚫"}</div>
            <div style={{fontSize:"20px",fontWeight:800,fontFamily:S.sf,color:sc(lr.overall)}}>{lr.overall==="safe"?"Likely Safe":lr.overall==="caution"?"Use Caution":"Contains Allergens"}</div>
            <div style={{fontSize:"12px",color:S.mut,marginTop:"4px"}}>{lr.summary}</div>
          </div>
          <div style={{display:"flex",gap:"6px",marginBottom:"14px"}}>
            {[{l:"Danger",c:lr.dc,color:S.r},{l:"Caution",c:lr.cc,color:S.y},{l:"Safe",c:lr.sc,color:S.g}].map(s=>(
              <div key={s.l} style={{flex:1,padding:"10px",borderRadius:"12px",background:`${s.color}11`,textAlign:"center",border:`1px solid ${s.color}22`}}>
                <div style={{fontSize:"20px",fontWeight:800,fontFamily:S.sf,color:s.color}}>{s.c}</div>
                <div style={{fontSize:"9px",color:s.color,fontWeight:600,textTransform:"uppercase"}}>{s.l}</div>
              </div>
            ))}
          </div>
          {lr.items.filter(i=>i.status!=="safe").length>0&&<div style={{fontSize:"12px",color:S.r,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>✕ Flagged ({lr.items.filter(i=>i.status!=="safe").length})</div>}
          {lr.items.filter(i=>i.status!=="safe").map((item,i)=>(
            <div key={i} style={{padding:"11px 14px",marginBottom:"5px",borderRadius:"10px",background:sb(item.status),border:`1px solid ${sc(item.status)}22`,display:"flex",alignItems:"flex-start",gap:"10px"}}>
              <div style={{width:"8px",height:"8px",borderRadius:"50%",marginTop:"5px",background:sc(item.status),flexShrink:0}} />
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:"13px",color:"#fff"}}>{item.ingredient}{item.allergen&&<span style={{marginLeft:"6px",fontSize:"10px",padding:"2px 6px",background:`${sc(item.status)}22`,borderRadius:"4px",color:sc(item.status)}}>{item.allergen}</span>}</div>
                <div style={{fontSize:"11px",color:S.mut,marginTop:"1px"}}>{item.reason}</div>
              </div>
            </div>
          ))}
          {lr.items.filter(i=>i.status==="safe").length>0&&<>
            <div style={{fontSize:"12px",color:S.g,textTransform:"uppercase",letterSpacing:"1px",margin:"12px 0 8px"}}>✓ Safe ({lr.items.filter(i=>i.status==="safe").length})</div>
            {lr.items.filter(i=>i.status==="safe").map((item,i)=>(
              <div key={i} style={{padding:"8px 14px",marginBottom:"3px",borderRadius:"8px",background:"rgba(34,197,94,0.04)",border:"1px solid rgba(34,197,94,0.1)",fontSize:"12px",color:"rgba(255,255,255,0.5)",display:"flex",alignItems:"center",gap:"8px"}}><span style={{color:S.g}}>✓</span>{item.ingredient}</div>
            ))}
          </>}

        </div>);})()}

        {/* ═══ SCANNER ═══ */}
        {pg==="scanner"&&<div>
          <h1 style={{fontFamily:S.sf,fontSize:"24px",fontWeight:800,color:"#fff",margin:"0 0 4px"}}>Ingredient Scanner</h1>
          <p style={{color:S.mut,fontSize:"13px",marginBottom:"14px",lineHeight:1.5}}>Scan a label photo, search by name, or paste ingredients manually.</p>

          {/* Tab bar */}
          <div style={{display:"flex",gap:"4px",marginBottom:"16px",background:"rgba(255,255,255,0.04)",borderRadius:"12px",padding:"4px"}}>
            {[{id:"photo",icon:"📷",label:"Barcode"},{id:"search",icon:"🔍",label:"Search"},{id:"manual",icon:"✏️",label:"Manual"}].map(t=>(
              <button key={t.id} onClick={()=>{ setScannerTab(t.id); setFoodResults([]); setFoodError(""); setNutResults([]); setNutError(""); setBarcodeError(""); if(t.id!=="photo") stopBarcodeScanner(); }}
                style={{flex:1,padding:"9px 0",border:"none",borderRadius:"9px",fontFamily:S.f,fontSize:"13px",fontWeight:600,cursor:"pointer",transition:"all 0.15s",
                  background:scannerTab===t.id?"linear-gradient(135deg,#7c3aed,#6d28d9)":"transparent",
                  color:scannerTab===t.id?"#fff":"rgba(255,255,255,0.4)"}}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          {/* Barcode tab */}
          {scannerTab==="photo"&&<div>
            {foodNoIngredients&&<div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:"12px",padding:"12px 14px",marginBottom:"14px",display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <span style={{fontSize:"18px",flexShrink:0}}>🔍</span>
              <div>
                <div style={{fontSize:"13px",color:"#fcd34d",fontWeight:600,marginBottom:"2px"}}>No ingredient list found for "{foodNoIngredients}"</div>
                <div style={{fontSize:"12px",color:S.mut}}>Scan the product's barcode below for a full allergen check.</div>
              </div>
              <button onClick={()=>setFoodNoIngredients("")} style={{marginLeft:"auto",background:"none",border:"none",color:S.mut,fontSize:"16px",cursor:"pointer",padding:"0",flexShrink:0}}>×</button>
            </div>}
            {!barcodeScanning ? (
              <div style={{padding:"28px 16px",background:S.card,border:`1.5px dashed ${S.brd}`,borderRadius:"14px",textAlign:"center",marginBottom:"14px"}}>
                <div style={{fontSize:"36px",marginBottom:"8px"}}>📦</div>
                <div style={{fontSize:"14px",color:"rgba(255,255,255,0.8)",fontWeight:600,marginBottom:"4px"}}>Scan a Barcode</div>
                <div style={{fontSize:"12px",color:S.mut,marginBottom:"16px"}}>Point your camera at the barcode on the product</div>
                <button onClick={startBarcodeScanner} style={{padding:"10px 28px",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",border:"none",borderRadius:"10px",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>Start Scanner</button>
              </div>
            ) : (
              <div style={{marginBottom:"14px"}}>
                <div style={{position:"relative",borderRadius:"14px",overflow:"hidden",background:"#000",marginBottom:"10px"}}>
                  <video id="barcode-video" style={{width:"100%",display:"block",maxHeight:"220px",objectFit:"cover"}} />
                  <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:"200px",height:"80px",border:"2px solid #22c55e",borderRadius:"8px",pointerEvents:"none"}} />
                  {barcodeLoading&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:"#fff"}}>⏳ Looking up product…</div>}
                </div>
                {barcodeError&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"10px",padding:"10px 12px",fontSize:"12px",color:"#fca5a5",marginBottom:"8px"}}>{barcodeError}</div>}
                <button onClick={stopBarcodeScanner} style={{width:"100%",padding:"10px",background:"rgba(255,255,255,0.05)",border:`1px solid ${S.brd}`,borderRadius:"10px",color:S.mut,fontSize:"12px",cursor:"pointer",fontFamily:S.f}}>Stop Scanner</button>
              </div>
            )}
          </div>}

          {/* Search tab */}
          {scannerTab==="search"&&<div style={{marginBottom:"14px"}}>
            <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
              <input value={foodQuery}
                onChange={e=>{setFoodQuery(e.target.value);if(foodError)setFoodError("");if(foodResults.length)setFoodResults([]);}}
                onKeyDown={e=>e.key==="Enter"&&searchFood()}
                placeholder="e.g. Oreo, Chobani Greek yogurt, Tyson nuggets..."
                style={{flex:1,padding:"11px 13px",background:"rgba(255,255,255,0.05)",border:`1.5px solid ${foodError?"rgba(239,68,68,0.4)":S.brd}`,borderRadius:"10px",color:"#fff",fontSize:"13px",fontFamily:S.f,outline:"none",boxSizing:"border-box"}} />
              <button onClick={()=>searchFood()} disabled={!foodQuery.trim()||foodLoading}
                style={{padding:"11px 18px",background:foodQuery.trim()&&!foodLoading?"linear-gradient(135deg,#7c3aed,#6d28d9)":"rgba(255,255,255,0.05)",border:"none",borderRadius:"10px",color:foodQuery.trim()&&!foodLoading?"#fff":"rgba(255,255,255,0.2)",fontSize:"13px",fontWeight:700,cursor:foodQuery.trim()&&!foodLoading?"pointer":"default",fontFamily:S.f,whiteSpace:"nowrap"}}>
                {foodLoading?"…":"Search"}
              </button>
            </div>
            {foodError&&<div style={{fontSize:"12px",color:"#fca5a5",marginBottom:"8px",padding:"9px 12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:"8px"}}>{foodError}</div>}
            {foodResults.length>0&&<div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
              {foodResults.map((item,i)=>(
                <button key={i} onClick={()=>pickFoodResult(item)}
                  style={{padding:"11px 13px",background:"rgba(255,255,255,0.03)",border:`1px solid ${S.brd}`,borderRadius:"10px",cursor:"pointer",fontFamily:S.f,color:"#e8e6f0",textAlign:"left",display:"flex",alignItems:"center",gap:"10px",width:"100%"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:"13px",color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.label}</div>
                    <div style={{fontSize:"10px",color:S.mut,marginTop:"1px"}}>{item.brand||item.category||""}{item.ingredients?<span style={{marginLeft:item.brand?6:0,color:"rgba(255,255,255,0.3)"}}>{item.ingredients.split(",").slice(0,3).join(", ")}{item.ingredients.split(",").length>3?"…":""}</span>:<span style={{marginLeft:item.brand?6:0,color:S.mut}}>Allergen check by name</span>}</div>
                  </div>
                  <span style={{fontSize:"11px",color:S.p,fontWeight:600,flexShrink:0}}>Scan →</span>
                </button>
              ))}

              </button>);
            })}
          </>}
        </div>}

        {/* ═══ CHAIN DETAIL ═══ */}
        {pg==="chain"&&viewChain&&<div>
          <button onClick={()=>nav("dining")} style={{background:"none",border:"none",color:S.p,fontSize:"13px",cursor:"pointer",fontFamily:S.f,padding:"0 0 12px"}}>← Back</button>
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px"}}>
            <span style={{fontSize:"36px"}}>{viewChain.icon}</span>
            <div>
              <h1 style={{fontFamily:S.sf,fontSize:"24px",fontWeight:800,color:"#fff",margin:0}}>{viewChain.name}</h1>
              <div style={{fontSize:"12px",color:S.mut}}>{viewChain.type} · {viewChain.menu.length} items</div>
              {viewChain.address&&<div style={{fontSize:"11px",color:S.p,marginTop:"2px"}}>📍 {viewChain.address} · {viewChain.distance} mi</div>}
            </div>
          </div>
          {viewChain.menu.filter(m=>!m.a.some(a=>prof.allergens.includes(a))).length>0&&<>
            <h3 style={{fontSize:"11px",color:S.g,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>✓ Safe for You ({viewChain.menu.filter(m=>!m.a.some(a=>prof.allergens.includes(a))).length})</h3>
            {viewChain.menu.filter(m=>!m.a.some(a=>prof.allergens.includes(a))).map((m,i)=>(
              <div key={i} style={{padding:"12px 14px",marginBottom:"4px",borderRadius:"10px",background:"rgba(34,197,94,0.06)",border:"1px solid rgba(34,197,94,0.15)",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{color:S.g,fontSize:"14px"}}>✓</span>
                <div><div style={{fontWeight:600,fontSize:"13px",color:"#fff"}}>{m.name}</div>{m.a.length>0?<div style={{fontSize:"10px",color:S.mut,marginTop:"1px"}}>Contains: {m.a.map(a=>(AL.find(function(x){return x.id===a})||{}).label).join(", ")}</div>:<div style={{fontSize:"10px",color:"rgba(34,197,94,0.6)",marginTop:"1px"}}>No common allergens</div>}</div>
              </div>
            ))}
          </>}
          {viewChain.menu.filter(m=>m.a.some(a=>prof.allergens.includes(a))).length>0&&<>
            <h3 style={{fontSize:"11px",color:S.r,textTransform:"uppercase",letterSpacing:"1px",margin:"16px 0 8px"}}>✕ Contains Your Allergens ({viewChain.menu.filter(m=>m.a.some(a=>prof.allergens.includes(a))).length})</h3>
            {viewChain.menu.filter(m=>m.a.some(a=>prof.allergens.includes(a))).map((m,i)=>{
              const hits=m.a.filter(a=>prof.allergens.includes(a));
              return(<div key={i} style={{padding:"12px 14px",marginBottom:"4px",borderRadius:"10px",background:"rgba(239,68,68,0.05)",border:"1px solid rgba(239,68,68,0.12)",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{color:S.r,fontSize:"14px"}}>✕</span>
                <div><div style={{fontWeight:600,fontSize:"13px",color:"rgba(255,255,255,0.6)"}}>{m.name}</div>
                <div style={{fontSize:"10px",color:S.mut,marginTop:"1px"}}>{hits.map(a=><span key={a} style={{marginRight:"6px",padding:"1px 5px",background:"rgba(239,68,68,0.15)",borderRadius:"3px",color:"#fca5a5",fontSize:"9px"}}>{(AL.find(function(x){return x.id===a})||{}).icon} {(AL.find(function(x){return x.id===a})||{}).label}</span>)}</div></div>
              </div>);
            })}
          </>}
        </div>}

        {/* ═══ PROFILE ═══ */}
        {pg==="profile"&&<div>
          <h1 style={{fontFamily:S.sf,fontSize:"24px",fontWeight:800,color:"#fff",margin:"0 0 14px"}}>Your Profile</h1>
          <div style={{padding:"20px",borderRadius:"16px",background:S.card,border:`1px solid ${S.brd}`,marginBottom:"14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"14px"}}>
              <div style={{width:"48px",height:"48px",borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",fontWeight:700,color:"#fff"}}>{prof.name.charAt(0).toUpperCase()}</div>
              <div><div style={{fontWeight:700,fontSize:"18px",color:"#fff"}}>{prof.name}</div><div style={{fontSize:"11px",color:S.mut}}>@{currentUser} · Since {new Date(prof.createdAt).toLocaleDateString()}</div></div>
            </div>

            {/* Allergens - editable */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
              <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px"}}>Allergens</div>
              {!editingAllergens?
                <button onClick={()=>{setEditAllergens([...prof.allergens]);setEditCustomList([...(prof.customAllergens||[])]);setEditCustomInput("");setEditingAllergens(true);}} style={{background:"none",border:"none",color:S.p,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:600}}>Edit</button>:
                <div style={{display:"flex",gap:"8px"}}>
                  <button onClick={()=>setEditingAllergens(false)} style={{background:"none",border:"none",color:S.mut,fontSize:"12px",cursor:"pointer",fontFamily:S.f}}>Cancel</button>
                  <button onClick={saveAllergenEdits} disabled={editAllergens.length===0} style={{background:"none",border:"none",color:editAllergens.length===0?S.mut:S.g,fontSize:"12px",cursor:editAllergens.length===0?"default":"pointer",fontFamily:S.f,fontWeight:600}}>Save{editAllergens.length===0?" (select 1+)":""}</button>
                </div>
              }
            </div>
            {!editingAllergens?
              <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                {prof.allergens.map(id=>{const a=AL.find(x=>x.id===id);return <span key={id} style={{padding:"5px 10px",background:S.pbg,border:"1px solid rgba(139,92,246,0.3)",borderRadius:"8px",fontSize:"11px",color:"#c4b5fd"}}>{a&&a.icon} {a&&a.label}</span>;})}
                {(prof.customAllergens||[]).map((c,i)=><span key={"c"+i} style={{padding:"5px 10px",background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:"8px",fontSize:"11px",color:"#fcd34d"}}>✦ {c}</span>)}
              </div>:
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px",marginBottom:"10px"}}>
                  {AL.map(a=>{const sel=editAllergens.includes(a.id);return(
                    <button key={a.id} onClick={()=>setEditAllergens(p=>sel?p.filter(x=>x!==a.id):[...p,a.id])}
                      style={{padding:"8px",background:sel?S.pbg:S.card,border:sel?"1.5px solid rgba(139,92,246,0.5)":`1.5px solid ${S.brd}`,borderRadius:"8px",cursor:"pointer",display:"flex",alignItems:"center",gap:"6px",fontFamily:S.f,color:sel?"#c4b5fd":"rgba(255,255,255,0.4)",fontSize:"11px"}}>
                      <span style={{fontSize:"16px"}}>{a.icon}</span>{a.label}{sel&&<span style={{marginLeft:"auto",color:S.p}}>✓</span>}
                    </button>
                  );})}
                </div>
                <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",fontWeight:600,marginBottom:"6px"}}>Custom allergens</div>
                <div style={{display:"flex",gap:"6px",marginBottom:"6px"}}>
                  <input value={editCustomInput} onChange={e=>setEditCustomInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&editCustomInput.trim()){setEditCustomList(p=>[...p,editCustomInput.trim()]);setEditCustomInput("");}}} placeholder="e.g. corn, MSG, latex..." style={{flex:1,padding:"7px 10px",background:"rgba(255,255,255,0.05)",border:`1px solid ${S.brd}`,borderRadius:"8px",color:"#fff",fontSize:"12px",fontFamily:S.f,outline:"none"}} />
                  <button onClick={()=>{if(editCustomInput.trim()){setEditCustomList(p=>[...p,editCustomInput.trim()]);setEditCustomInput("");}}} style={{padding:"7px 12px",background:S.pbg,border:`1px solid rgba(139,92,246,0.4)`,borderRadius:"8px",color:"#c4b5fd",fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:600}}>Add</button>
                </div>
                {editCustomList.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{editCustomList.map((c,i)=><span key={i} style={{padding:"3px 8px",background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:"20px",fontSize:"11px",color:"#fcd34d",display:"flex",alignItems:"center",gap:"4px"}}>{c}<button onClick={()=>setEditCustomList(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#f59e0b",cursor:"pointer",fontSize:"12px",padding:"0",lineHeight:1}}>×</button></span>)}</div>}
              </div>
            }
          </div>

          {/* Stats */}
          <div style={{padding:"20px",borderRadius:"16px",background:S.card,border:`1px solid ${S.brd}`,marginBottom:"14px"}}>
            <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"10px"}}>Statistics</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
              {[{l:"Total Scans",v:hist.length,c:"#fff"},{l:"Safe",v:hist.filter(h=>liveResult(h).overall==="safe").length,c:S.g},{l:"Danger",v:hist.filter(h=>liveResult(h).overall==="danger").length,c:S.r},{l:"Caution",v:hist.filter(h=>liveResult(h).overall==="caution").length,c:S.y}].map(s=>(
                <div key={s.l}><span style={{fontSize:"22px",fontWeight:800,fontFamily:S.sf,color:s.c}}>{s.v}</span><div style={{fontSize:"10px",color:S.mut}}>{s.l}</div></div>
              ))}
            </div>
          </div>

          {/* Emergency Allergen Card */}
          <div style={{padding:"20px",borderRadius:"16px",background:"linear-gradient(135deg, rgba(239,68,68,0.08), rgba(245,158,11,0.06))",border:"1px solid rgba(239,68,68,0.15)",marginBottom:"14px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
              <div style={{fontSize:"11px",color:S.r,textTransform:"uppercase",letterSpacing:"1px",fontWeight:600}}>🚨 Emergency Allergen Card</div>
              <button onClick={()=>{setShowEmergencyEdit(!showEmergencyEdit);if(!showEmergencyEdit){setEmergencyContact(prof.emergencyContact||"");setEmergencyPhone(prof.emergencyPhone||"");}}} style={{background:"none",border:"none",color:S.p,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:600}}>{showEmergencyEdit?"Cancel":"Edit"}</button>
            </div>
            {showEmergencyEdit?(
              <div>
                <label style={{fontSize:"11px",color:S.mut,display:"block",marginBottom:"4px"}}>Emergency Contact Name</label>
                <input value={emergencyContact} onChange={e=>setEmergencyContact(e.target.value)} placeholder="e.g. Mom, Dr. Smith"
                  style={{width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.05)",border:`1px solid ${S.brd}`,borderRadius:"8px",color:"#fff",fontSize:"13px",fontFamily:S.f,outline:"none",boxSizing:"border-box",marginBottom:"10px"}} />
                <label style={{fontSize:"11px",color:S.mut,display:"block",marginBottom:"4px"}}>Emergency Phone</label>
                <input value={emergencyPhone} onChange={e=>setEmergencyPhone(e.target.value)} placeholder="(555) 123-4567"
                  style={{width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.05)",border:`1px solid ${S.brd}`,borderRadius:"8px",color:"#fff",fontSize:"13px",fontFamily:S.f,outline:"none",boxSizing:"border-box",marginBottom:"10px"}} />
                <button onClick={saveEmergency} style={{width:"100%",padding:"10px",background:"linear-gradient(135deg,#22c55e,#16a34a)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>Save Emergency Info</button>
              </div>
            ):(
              <div>
                <div style={{padding:"14px",borderRadius:"12px",background:"rgba(0,0,0,0.2)",marginBottom:"8px"}}>
                  <div style={{fontSize:"16px",fontWeight:700,color:"#fff",marginBottom:"6px"}}>{prof.name}</div>
                  <div style={{fontSize:"12px",color:"rgba(255,255,255,0.6)",marginBottom:"8px"}}>I have the following food allergies:</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"10px"}}>
                    {prof.allergens.map(id=>{const a=AL.find(x=>x.id===id);return <span key={id} style={{padding:"4px 10px",background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:"6px",fontSize:"12px",color:"#fca5a5",fontWeight:600}}>{a&&a.icon} {a&&a.label}</span>;})}
                  </div>
                  {(prof.emergencyContact||prof.emergencyPhone)&&(
                    <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:"8px",marginTop:"4px"}}>
                      <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"4px"}}>Emergency Contact</div>
                      {prof.emergencyContact&&<div style={{fontSize:"13px",color:"#fff",fontWeight:600}}>{prof.emergencyContact}</div>}
                      {prof.emergencyPhone&&<div style={{fontSize:"13px",color:S.p}}>{prof.emergencyPhone}</div>}
                    </div>
                  )}
                  {!prof.emergencyContact&&!prof.emergencyPhone&&(
                    <div style={{fontSize:"11px",color:S.mut,fontStyle:"italic"}}>Tap Edit to add an emergency contact</div>
                  )}
                </div>
                <div style={{fontSize:"10px",color:S.mut,textAlign:"center"}}>Show this card to restaurant staff or anyone preparing your food</div>
              </div>
            )}
          </div>

          {/* Actions */}
          <button onClick={doLogout} style={{width:"100%",padding:"13px",marginBottom:"8px",background:"rgba(139,92,246,0.08)",border:"1px solid rgba(139,92,246,0.2)",borderRadius:"12px",color:S.p,fontSize:"14px",fontWeight:600,cursor:"pointer",fontFamily:S.f}}>
            Log Out
          </button>
          {!confirmDelete?
            <button onClick={()=>setConfirmDelete(true)} style={{width:"100%",padding:"13px",background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:"12px",color:"#fca5a5",fontSize:"13px",fontWeight:600,cursor:"pointer",fontFamily:S.f}}>
              Delete Account
            </button>:
            <div style={{padding:"16px",borderRadius:"12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)"}}>
              <div style={{fontSize:"13px",color:"#fca5a5",marginBottom:"10px"}}>Are you sure? This permanently deletes your account, allergens, and scan history.</div>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>setConfirmDelete(false)} style={{flex:1,padding:"10px",background:"rgba(255,255,255,0.05)",border:`1px solid ${S.brd}`,borderRadius:"8px",color:S.mut,fontSize:"13px",cursor:"pointer",fontFamily:S.f}}>Cancel</button>
                <button onClick={doDeleteAccount} style={{flex:1,padding:"10px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"8px",color:"#fca5a5",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>Yes, Delete</button>
              </div>
            </div>
          }
        </div>}
      </main>

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(8,11,20,0.97)",backdropFilter:"blur(28px)",WebkitBackdropFilter:"blur(28px)",borderTop:`1px solid rgba(255,255,255,0.07)`,paddingBottom:"env(safe-area-inset-bottom,8px)",display:"flex",zIndex:100}}>
        <NavBtn id="home" icon="🏠" label="Home" />
        <NavBtn id="scanner" icon="🔬" label="Scan" />
        <NavBtn id="nutrition" icon="🍎" label="Nutrition" />
        <NavBtn id="dining" icon="📍" label="Dining" />
        <NavBtn id="profile" icon="👤" label="Profile" />
      </nav>
    </div>
  );
}

// ─── RENDER ───
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>

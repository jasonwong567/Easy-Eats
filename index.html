  <script type="text/babel">
const { useState, useEffect, useRef } = React;


// ─── CLOUDFLARE WORKER CONFIG ───
// After deploying your worker, replace this URL with your actual worker URL.
// Format: https://easy-eats-api.<YOUR_SUBDOMAIN>.workers.dev
const WORKER_URL = "https://easy-eats-api.jasonwong38927.workers.dev";

// Module-level refs so runScan (defined outside App) can access loaded data
const ALRef = { current: [] };
const FPRef = { current: [] };
const AMBRef = { current: [] };
const CITIESRef = { current: [] };

// ─── ANALYSIS ENGINE ───
// ua = array of allergen IDs, customAllergens = array of custom allergen strings
function runScan(text, ua, customAllergens) {
    const AL = ALRef.current.length ? ALRef.current : [];
    const FP = FPRef.current.length ? FPRef.current : [];
    const AMB = AMBRef.current.length ? AMBRef.current : [];
  const lower = text.toLowerCase();
  const raw = lower.replace(/\([^)]*\)/g, m => m.replace(/,/g, "§")).split(/[,;]/).map(s => s.replace(/§/g, ",").trim()).filter(s => s.length > 1);
  const items = []; const dSet = new Set(); const cSet = new Set();
  const custom = (customAllergens||[]).map(c => c.toLowerCase().trim()).filter(Boolean);
  raw.forEach(ing => {
    const c = ing.replace(/^\d+%?\s*(or less of:?\s*)?/i,"").replace(/[()]/g," ").replace(/\s+/g," ").trim();
    if (!c) return;
    let m = false;
    const sk = new Set();
    FP.forEach(r => { if (c.includes(r.p)) r.s.forEach(s => sk.add(s)); });
    // Check custom allergens first
    for (const cv of custom) {
      if (c.includes(cv)) {
        items.push({ingredient:c,status:"danger",allergen:cv,reason:`Contains "${cv}" — custom allergen`});
        dSet.add("custom:"+cv); m = true; break;
      }
    }
    if (!m) {
      for (const aid of ua) {
        if (sk.has(aid)) continue;
        const a = AL.find(x => x.id === aid);
        if (!a) continue;
        for (const v of a.v) {
          if (c.includes(v)) {
            items.push({ingredient:c,status:"danger",allergen:a.label,reason:v===c?`Direct ${a.label.toLowerCase()} allergen`:`Contains "${v}" — ${a.label.toLowerCase()} derivative`});
            dSet.add(aid); m = true; break;
          }
        }
        if (m) break;
      }
    }
    if (!m) {
      for (const amb of AMB) {
        if (c.includes(amb.p)) {
          const rel = amb.r.filter(a => ua.includes(a));
          if (rel.length > 0 || amb.r.length === 0) {
            items.push({ingredient:c,status:"caution",allergen:rel.map(a=>(AL.find(function(x){return x.id===a})||{}).label).filter(Boolean).join(", ")||"Cross-contamination",reason:amb.w});
            rel.forEach(a => cSet.add(a)); m = true; break;
          }
        }
      }
    }
    if (!m) items.push({ingredient:c,status:"safe",allergen:null,reason:"No match"});
  });
  let overall = "safe", summary = "";
  const dangerLabels = [...dSet].map(id => id.startsWith("custom:") ? id.replace("custom:","") : (AL.find(function(a){return a.id===id})||{}).label).filter(Boolean);
  if (dSet.size > 0) { overall = "danger"; summary = `Contains ${dangerLabels.join(", ")} allergens.`; }
  else if (cSet.size > 0) { overall = "caution"; summary = "Some ingredients may contain hidden allergen derivatives."; }
  else summary = "No allergens detected for your profile.";
  return { overall, items, summary };
}

// ─── FONTS ───
if (!document.querySelector('link[href*="Inter"]')) {
  const fl = document.createElement("link");
  fl.href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Calistoga&family=JetBrains+Mono:wght@400;500;600&display=swap";
  fl.rel="stylesheet"; document.head.appendChild(fl);
}

// ─── DESIGN TOKENS ───
const S = {
  // Typography
  f: "'Inter', -apple-system, sans-serif",
  sf: "'Calistoga', Georgia, serif",
  mono: "'JetBrains Mono', monospace",
  // Backgrounds
  bg: "#F5F7FF",
  bgDark: "#111827",
  card: "#FFFFFF",
  card2: "#EEF2FF",
  cardDark: "#1F2937",
  // Accent - Electric Blue
  p: "#0052FF",
  p2: "#4D7CFF",
  pGrad: "linear-gradient(135deg, #0052FF, #4D7CFF)",
  pbg: "rgba(0,82,255,0.06)",
  pBrd: "rgba(0,82,255,0.18)",
  // Text
  text: "#0A0A0A",
  text2: "#374151",
  mut: "#6B7280",
  mut2: "#9CA3AF",
  // Status
  g: "#16a34a",
  gbg: "rgba(22,163,74,0.08)",
  gbrd: "rgba(22,163,74,0.2)",
  y: "#d97706",
  ybg: "rgba(217,119,6,0.08)",
  ybrd: "rgba(217,119,6,0.2)",
  r: "#dc2626",
  rbg: "rgba(220,38,38,0.08)",
  rbrd: "rgba(220,38,38,0.2)",
  // Border & Shadow
  brd: "#E5E7EB",
  shadow: "0 4px 24px rgba(0,0,0,0.08)",
  shadowSm: "0 2px 8px rgba(0,0,0,0.06)",
  shadowMd: "0 8px 32px rgba(0,0,0,0.12)",
  shadowBlue: "0 4px 20px rgba(0,82,255,0.2)",
};
const sc = s => s==="safe"?S.g:s==="caution"?S.y:S.r;
const sb = s => s==="safe"?S.gbg:s==="caution"?S.ybg:S.rbg;
const sbrd = s => s==="safe"?S.gbrd:s==="caution"?S.ybrd:S.rbrd;

// ─── FIREBASE ───
firebase.initializeApp({
  apiKey: "AIzaSyAqfsp3b8kZOom_eGE-IeUjH5tEdzQJ8kU",
  authDomain: "easy-eats-246e5.firebaseapp.com",
  projectId: "easy-eats-246e5",
  storageBucket: "easy-eats-246e5.firebasestorage.app",
  messagingSenderId: "102304654158",
  appId: "1:102304654158:web:377d9dd0d0760760adf41f",
});
const auth = firebase.auth();
const db = firebase.firestore();
// Enable offline persistence so Firestore reads come from local cache instantly
db.enablePersistence({ synchronizeTabs: true }).catch(() => {});

function App() {
  const [loaded, setLoaded] = useState(false);
  const [chains, setChains] = useState([]);
  const chainsRef = useRef([]);
  const [AL, setAL] = useState([]);
  const [FP, setFP] = useState([]);
  const [AMB, setAMB] = useState([]);
  const [CITIES, setCITIES] = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [prof, setProf] = useState(null);

  // Auth state
  const [authMode, setAuthMode] = useState("login"); // login, signup, setupAllergens
  const [authUser, setAuthUser] = useState("");
  const [authPass, setAuthPass] = useState("");
  const [authName, setAuthName] = useState("");
  const [authAllergens, setAuthAllergens] = useState([]);
  const [authCustom, setAuthCustom] = useState("");
  const [authCustomList, setAuthCustomList] = useState([]);
  const [authError, setAuthError] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [forgotSent, setForgotSent] = useState(false);
  const [authLoading, setAuthLoading] = useState(false);
  const [pendingGoogleUid, setPendingGoogleUid] = useState(null);
  const [pendingGoogleEmail, setPendingGoogleEmail] = useState(null);

  // App state
  const [pg, setPg] = useState("home");
  const [txt, setTxt] = useState("");
  const [res, setRes] = useState(null);
  const [resLabel, setResLabel] = useState("");
  const [resultStack, setResultStack] = useState([]); // stack of {res, label, fromPage}
  const [viewChain, setViewChain] = useState(null);
  const [viewHist, setViewHist] = useState(null);
  const [fade, setFade] = useState(true);
  const [locInput, setLocInput] = useState("");
  const [locSet, setLocSet] = useState("");
  const [nearbyResults, setNearbyResults] = useState([]);
  const [editingAllergens, setEditingAllergens] = useState(false);
  const [editAllergens, setEditAllergens] = useState([]);
  const [editCustomList, setEditCustomList] = useState([]);
  const [editCustomInput, setEditCustomInput] = useState("");
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deletePassword, setDeletePassword] = useState("");
  const [deleteError, setDeleteError] = useState("");
  const [deleting, setDeleting] = useState(false);
  const [signingUp, setSigningUp] = useState(false);
  const [emergencyContact, setEmergencyContact] = useState("");
  const [emergencyPhone, setEmergencyPhone] = useState("");
  const [showEmergencyEdit, setShowEmergencyEdit] = useState(false);
  const [photoPreview, setPhotoPreview] = useState(null);
  const [ocrLoading, setOcrLoading] = useState(false);
  const [ocrBad, setOcrBad] = useState(false);
  const [ocrError, setOcrError] = useState("");
  const [barcodeScanning, setBarcodeScanning] = useState(false);
  const [barcodeLoading, setBarcodeLoading] = useState(false);
  const [barcodeError, setBarcodeError] = useState("");
  const barcodeReaderRef = useRef(null);
  const [photoLabel, setPhotoLabel] = useState("");
  const [scannerTab, setScannerTab] = useState("search");
  const [copied, setCopied] = useState(false);
  const [histFilter, setHistFilter] = useState("all");

  useEffect(() => {
    if (pg !== "scanner") stopBarcodeScanner();
  }, [pg]);

  // Food search state (Edamam via Cloudflare Worker)
  const [foodQuery, setFoodQuery] = useState("");
  const [foodResults, setFoodResults] = useState([]);
  const [foodLoading, setFoodLoading] = useState(false);
  const [foodError, setFoodError] = useState("");
  const [foodNoIngredients, setFoodNoIngredients] = useState("");

  // Nutrition tab state
  const [nutQuery, setNutQuery] = useState("");
  const [nutResults, setNutResults] = useState([]);
  const [nutLoading, setNutLoading] = useState(false);
  const [nutError, setNutError] = useState("");
  const [nutSelected, setNutSelected] = useState(null);
  const [nutDetail, setNutDetail] = useState(null);
  const [nutDetailLoading, setNutDetailLoading] = useState(false);

  // Map state
  const [mapCenter, setMapCenter] = useState(null);
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);

  // Restore session via Firebase Auth
  // Step 1: load from localStorage cache instantly so app shows immediately
  useEffect(() => {
    try {
      const cached = localStorage.getItem("ee_session");
      if (cached) {
        const { email, prof: cachedProf } = JSON.parse(cached);
        if (email && cachedProf) {
          setCurrentUser(email);
          setProf(cachedProf);
          setEmergencyContact(cachedProf.emergencyContact||"");
          setEmergencyPhone(cachedProf.emergencyPhone||"");
          setLoaded(true); // show app immediately from cache
        }
      }
    } catch(e) {}
  }, []);

  // Step 2: confirm with Firebase in background, update if changed, clear if session expired
  useEffect(() => {
    // If we already loaded from cache, set a 3s max wait for Firebase
    // so slow connections don't leave user stuck on "Signing in..."
    let fallbackTimer = null;
    const triggerFallback = () => {
      try {
        const cached = localStorage.getItem("ee_session");
        if (cached) {
          const { email, prof: cachedProf } = JSON.parse(cached);
          if (email && cachedProf) {
            setCurrentUser(email); setProf(cachedProf);
            setEmergencyContact(cachedProf.emergencyContact||"");
            setEmergencyPhone(cachedProf.emergencyPhone||"");
          }
        }
      } catch(e) {}
      setAuthLoading(false); setLoaded(true);
    };
    fallbackTimer = setTimeout(triggerFallback, 3000);

    const unsub = auth.onAuthStateChanged(async (fbUser) => {
      clearTimeout(fallbackTimer);
      if (fbUser) {
        try {
          const snap = await db.collection("users").doc(fbUser.uid).get({ source: "cache" }).catch(() =>
            db.collection("users").doc(fbUser.uid).get()
          );
          if (snap.exists) {
            const data = snap.data();
            setCurrentUser(fbUser.email);
            setProf(data);
            setEmergencyContact(data.emergencyContact||"");
            setEmergencyPhone(data.emergencyPhone||"");
            try { localStorage.setItem("ee_session", JSON.stringify({ email: fbUser.email, prof: data })); } catch(e) {}
          } else {
            localStorage.removeItem("ee_session");
            setCurrentUser(null); setProf(null);
            setPendingGoogleUid(fbUser.uid);
            setPendingGoogleEmail(fbUser.email);
            setAuthName(fbUser.displayName||"");
            setAuthMode("setupAllergens");
            setAuthLoading(false);
          }
        } catch(e) {
          console.error("Firestore load error:", e);
          setAuthError("Couldn't load your profile — check your connection and try again.");
          setAuthLoading(false);
          setLoaded(true);
          setCurrentUser(null); setProf(null);
          return;
        }
      } else {
        localStorage.removeItem("ee_session");
        setCurrentUser(null); setProf(null);
        setPg("home"); setAuthMode("login");
        setPendingGoogleUid(null); setPendingGoogleEmail(null);
      }
      setAuthLoading(false);
      setLoaded(true);
    });
    return () => { clearTimeout(fallbackTimer); unsub(); };
  }, []);

  // Load external data files — serve from localStorage cache for instant load, refresh in background
  useEffect(() => {
    const CACHE_TTL = 24 * 60 * 60 * 1000; // 24 hours
    const loadCached = (key, url, onData) => {
      try {
        const cached = localStorage.getItem("ee_cache_" + key);
        if (cached) {
          const { data, ts } = JSON.parse(cached);
          if (Date.now() - ts < CACHE_TTL) { onData(data); }
        }
      } catch(e) {}
      // Always fetch fresh in background to keep cache warm
      fetch(url).then(r=>r.json()).then(data => {
        onData(data);
        try { localStorage.setItem("ee_cache_" + key, JSON.stringify({ data, ts: Date.now() })); } catch(e) {}
      }).catch(()=>{});
    };
    loadCached("chains", "chains.json", data => { chainsRef.current = data; setChains(data); });
    loadCached("allergens", "allergens.json", data => {
      ALRef.current = data.AL; setAL(data.AL);
      FPRef.current = data.FP; setFP(data.FP);
      AMBRef.current = data.AMB; setAMB(data.AMB);
    });
    loadCached("cities", "cities.json", data => { CITIESRef.current = data; setCITIES(data); });
  }, []);

  // Save user profile - use refs to avoid stale closures
  const profRef = useRef(prof);
  useEffect(() => { profRef.current = prof; }, [prof]);
  const currentUserRef = useRef(currentUser);
  useEffect(() => { currentUserRef.current = currentUser; }, [currentUser]);

  const saveProf = (updates) => {
    const fbUser = auth.currentUser;
    if (!fbUser) return;
    const newProf = { ...profRef.current, ...updates };
    setProf(newProf);
    db.collection("users").doc(fbUser.uid).update(updates).catch(()=>{});
    try { localStorage.setItem("ee_session", JSON.stringify({ email: fbUser.email, prof: newProf })); } catch(e) {}
  };

  // Auth actions
  const doLogin = async () => {
    setAuthError("");
    const email = authUser.trim();
    const p = authPass;
    if (!email || !p) { setAuthError("Enter email and password."); return; }
    setAuthLoading(true);
    // Safety timeout — if onAuthStateChanged never clears the spinner, do it after 12s
    const loginTimeout = setTimeout(() => {
      setAuthLoading(false);
      setAuthError("Login timed out — check your connection and try again.");
    }, 12000);
    try {
      await auth.signInWithEmailAndPassword(email, p);
      clearTimeout(loginTimeout);
      // onAuthStateChanged will fire, load profile, and set pg("home")
    } catch(e) {
      clearTimeout(loginTimeout);
      setAuthLoading(false);
      if (e.code==="auth/user-not-found"||e.code==="auth/invalid-credential"||e.code==="auth/wrong-password") setAuthError("Incorrect email or password.");
      else if (e.code==="auth/invalid-email") setAuthError("Invalid email address.");
      else if (e.code==="auth/too-many-requests") setAuthError("Too many attempts. Try again later or reset your password.");
      else setAuthError("Login failed: " + (e.message||"Try again."));
    }
  };

  const doSignup = async () => {
    setAuthError("");
    const email = authUser.trim();
    const p = authPass;
    const n = authName.trim();
    if (!n) { setAuthError("Enter your name."); return; }
    if (!email) { setAuthError("Enter your email."); return; }
    if (!p) { setAuthError("Choose a password."); return; }
    if (p.length < 6) { setAuthError("Password must be at least 6 characters."); return; }
    setAuthLoading(true);
    try {
      const methods = await auth.fetchSignInMethodsForEmail(email);
      if (methods.length > 0) { setAuthError("An account with this email already exists. Log in instead?"); setAuthLoading(false); return; }
    } catch(e) {
      if (e.code==="auth/invalid-email") { setAuthError("Invalid email address."); setAuthLoading(false); return; }
    }
    setAuthLoading(false);
    setAuthMode("setupAllergens");
  };

  const finishSignup = async () => {
    if (authAllergens.length === 0 && authCustomList.length === 0) { setAuthError("Select at least one allergen."); return; }
    setAuthError("");
    setSigningUp(true);
    try {
      let uid, email, displayName;
      if (pendingGoogleUid) {
        uid = pendingGoogleUid;
        email = pendingGoogleEmail || auth.currentUser?.email;
        displayName = authName.trim() || auth.currentUser?.displayName || "User";
        if (!uid || !email) throw new Error("Google session lost — please sign in again.");
      } else {
        const cred = await auth.createUserWithEmailAndPassword(authUser.trim(), authPass);
        uid = cred.user.uid; email = cred.user.email; displayName = authName.trim();
      }
      const newProf = { name: displayName, allergens: authAllergens, customAllergens: authCustomList, history: [], createdAt: new Date().toISOString() };
      try {
        await db.collection("users").doc(uid).set(newProf);
        // Verify write reached server with 8s timeout (offline persistence can silently queue writes)
        const verifyPromise = db.collection("users").doc(uid).get({ source: "server" });
        const timeoutPromise = new Promise((_,reject) => setTimeout(() => reject(new Error("timeout")), 8000));
        const verify = await Promise.race([verifyPromise, timeoutPromise]).catch(()=>null);
        if (verify && !verify.exists) throw new Error("Profile couldn't be saved — check your internet connection and try again.");
      } catch(firestoreErr) {
        if (!pendingGoogleUid) { try { await auth.currentUser?.delete(); } catch(e) {} }
        throw new Error("Profile couldn't be saved — check your internet connection and try again.");
      }
      // Cache immediately so onAuthStateChanged doesn't wipe state
      try { localStorage.setItem("ee_session", JSON.stringify({ email, prof: newProf })); } catch(e) {}
      setPendingGoogleUid(null); setPendingGoogleEmail(null);
      setCurrentUser(email); setProf(newProf);
      setAuthUser(""); setAuthPass(""); setAuthName(""); setAuthAllergens([]); setAuthCustomList([]); setAuthCustom(""); setAuthError("");
      setSigningUp(false);
      setPg("home");

  // Haversine distance in miles
  const haversine = (lat1, lon1, lat2, lon2) => {
    const R = 3959;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.pow(Math.sin(dLat/2),2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.pow(Math.sin(dLon/2),2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  };

      const key = Object.keys(aliases).find(k => cn.includes(k) || k.includes(cn));

  const searchWithOSM = async (locationName) => {
    try {
      // Step 1: Geocode location with Nominatim
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationName)}&limit=1&countrycodes=us`, {
        headers: { "User-Agent": "EasyEats/1.0" }
      });
      const geoData = await geoRes.json();
      if (!geoData.length) return null;

      const lat = parseFloat(geoData[0].lat);
      const lon = parseFloat(geoData[0].lon);
      const displayName = geoData[0].display_name.split(",").slice(0,2).join(",").trim();

      // Step 2: Query Overpass for restaurants/fast food within ~10 miles (16km)
      // Try primary then mirror — if both fail, return geocode coords with empty results so map still shows
      const overpassQuery = `[out:json][timeout:25];(node["amenity"="fast_food"](around:16000,${lat},${lon});node["amenity"="restaurant"](around:16000,${lat},${lon});node["amenity"="cafe"](around:16000,${lat},${lon});node["amenity"="ice_cream"](around:16000,${lat},${lon});node["amenity"="food_court"](around:16000,${lat},${lon}););out body 2000;`;
      const overpassEndpoints = [
        `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`,
        `https://overpass.kumi.systems/api/interpreter?data=${encodeURIComponent(overpassQuery)}`,
      ];

      let overpassData = null;
      for (const url of overpassEndpoints) {
        try {
          const ctrl = new AbortController();
          const tid = setTimeout(() => ctrl.abort(), 20000);
          const res = await fetch(url, { signal: ctrl.signal });
          clearTimeout(tid);
          if (res.ok) { overpassData = await res.json(); break; }
        } catch (e) { /* try next */ }
      }

      if (!overpassData || !(overpassData.elements&&overpassData.elements.length)) return { results: [], displayName, center: [lat, lon] };

      // Step 3: Match OSM results to our chain database
      const results = [];
      const seen = new Set();
      overpassData.elements.forEach(el => {
        const name = (el.tags&&el.tags.name);
        const chain = matchChain(name);
        if (!chain) return;

        const dist = haversine(lat, lon, el.lat, el.lon);
        if (dist > 10) return;

        const street = (el.tags&&el.tags["addr:street"]) || "";
        const houseNum = (el.tags&&el.tags["addr:housenumber"]) || "";
        const city = (el.tags&&el.tags["addr:city"]) || displayName;
        const addr = houseNum && street ? `${houseNum} ${street}, ${city}` : street ? `${street}, ${city}` : city;

        const locKey = `${chain.id}-${el.id}`;
        if (seen.has(locKey)) return;
        seen.add(locKey);

        results.push({
          ...chain,
          locId: locKey,
          address: addr,
          distance: parseFloat(dist.toFixed(1)),
          osmId: el.id,
          lat: el.lat,
          lon: el.lon,
        });
      });

      return { results: results.sort((a,b) => a.distance - b.distance), displayName, center: [lat, lon] };
    } catch (e) {
      return null;
    }
  };

    reader.onload = async (ev) => {
      // Convert any format (including HEIC) to JPEG via canvas

        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          canvas.getContext("2d").drawImage(img, 0, 0);
          resolve(canvas.toDataURL("image/jpeg", 0.92));
        };
        img.onerror = () => resolve(src); // fallback to original
        img.src = src;
      });
      const dataUrl = await toJpeg(ev.target.result);

      const resp = await fetch(

      );
      const data = await resp.json();
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const hits = (data.foods || []).map(f => {
        // Map USDA foodNutrients array to the format the nutrition card expects
        const nutMap = {};
        (f.foodNutrients || []).forEach(n => {
          if (n.nutrientId === 1008) nutMap.ENERC_KCAL = n.value;
          else if (n.nutrientId === 1003) nutMap.PROCNT = n.value;
          else if (n.nutrientId === 1004) nutMap.FAT = n.value;
          else if (n.nutrientId === 1005) nutMap.CHOCDF = n.value;
          else if (n.nutrientId === 1079) nutMap.FIBTG = n.value;
        });
        return {
          label: f.description || "",
          brand: f.brandOwner || null,
          ingredients: f.ingredients || null,
          nutrients: nutMap,
        };

      if (hits.length === 0) setNutError("No results found. Try a different search term.");
      else setNutResults(hits);

      setNutError("Search failed. Check your connection and try again.");
    }

              <button key={h.id} onClick={()=>{setViewHist(h);nav("histDetail",true);}} style={{padding:"13px 16px",marginBottom:"7px",background:S.card,border:`1px solid ${S.brd}`,borderRadius:"16px",display:"flex",alignItems:"center",gap:"12px",cursor:"pointer",fontFamily:S.f,color:S.text,textAlign:"left",width:"100%",boxShadow:S.shadowSm,transition:"box-shadow 0.15s"}}>
                {(()=>{const lr=liveResult(h);const changed=h.ingredients&&lr.overall!==h.overall;const clr=sc(lr.overall);return(<>
                <div style={{width:"38px",height:"38px",borderRadius:"12px",background:sb(lr.overall),border:`1px solid ${sbrd(lr.overall)}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",flexShrink:0}}>{lr.overall==="safe"?"✅":lr.overall==="caution"?"⚠️":"🚫"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:"14px",color:S.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:"3px"}}>{h.label}</div>
                  <div style={{fontSize:"11px",color:S.mut,display:"flex",gap:"8px",alignItems:"center",fontFamily:S.mono}}><span>{new Date(h.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>{lr.dc>0&&<span style={{color:S.r,fontWeight:600}}>● {lr.dc} danger</span>}{lr.cc>0&&<span style={{color:S.y,fontWeight:600}}>● {lr.cc} caution</span>}</div>
                </div>
                {changed&&<span style={{fontSize:"9px",fontWeight:700,color:S.y,background:S.ybg,border:`1px solid ${S.ybrd}`,borderRadius:"5px",padding:"2px 7px",flexShrink:0,fontFamily:S.mono}}>RESCAN</span>}
                <span style={{color:S.mut2,fontSize:"16px",flexShrink:0}}>›</span>
                </>)})()}
              </button>
            ))}
          </>; })()}
          </> : (
            <div style={{textAlign:"center",padding:"52px 24px",background:S.card,borderRadius:"22px",border:`1px solid ${S.brd}`,boxShadow:S.shadowSm}}>
              <div style={{width:"68px",height:"68px",borderRadius:"20px",background:S.pbg,border:`1px solid ${S.pBrd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"30px",margin:"0 auto 18px"}}>🔬</div>
              <div style={{fontFamily:S.sf,fontSize:"22px",fontWeight:400,color:S.text,marginBottom:"10px",letterSpacing:"-0.2px"}}>No scans yet</div>
              <div style={{fontSize:"13px",color:S.mut,lineHeight:1.65,marginBottom:"26px",maxWidth:"260px",margin:"0 auto 26px"}}>Search for a food or scan a barcode to check it against your allergens.</div>
              <button onClick={()=>nav("scanner")} style={{padding:"13px 30px",background:S.pGrad,border:"none",borderRadius:"14px",color:"#fff",fontSize:"14px",fontWeight:700,cursor:"pointer",fontFamily:S.f,boxShadow:S.shadowBlue,letterSpacing:"-0.2px"}}>Start Scanning</button>
            </div>
          )}
        </div>}

        {/* ═══ HIST DETAIL ═══ */}
        {pg==="histDetail"&&viewHist&&(()=>{const lr=liveResult(viewHist);const resultChanged=viewHist.ingredients&&lr.overall!==viewHist.overall;return(<div style={{animation:"fadeUp 0.3s ease both"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
            <button onClick={()=>nav("home")} style={{background:"none",border:"none",color:S.p,fontSize:"13px",cursor:"pointer",fontFamily:S.f,padding:0,fontWeight:600}}>← Back</button>
            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={()=>shareResults({...lr, scannedText: viewHist.ingredients}, viewHist.label, histDetailRef.current)} disabled={copied==="loading"} style={{padding:"8px 16px",background:copied===true?S.gbg:S.card,border:`1.5px solid ${copied===true?S.gbrd:S.brd}`,borderRadius:"10px",color:copied===true?S.g:S.mut,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:700,boxShadow:S.shadowSm}}>
                {copied==="loading"?"⏳":"📤 Share"}
              </button>
              <button onClick={()=>doScan(viewHist.ingredients||viewHist.label, viewHist.label)} style={{padding:"8px 16px",background:S.pGrad,border:"none",borderRadius:"10px",color:"#fff",fontSize:"12px",fontWeight:700,cursor:"pointer",fontFamily:S.f,boxShadow:S.shadowBlue}}>↺ Rescan</button>
            </div>
          </div>
          <div ref={histDetailRef} style={{background:S.bg,borderRadius:"16px",padding:"4px 0"}}>
          <h2 style={{fontFamily:S.sf,fontSize:"24px",fontWeight:400,color:S.text,margin:"0 0 4px",letterSpacing:"-0.3px"}}>{viewHist.label}</h2>
          <div style={{fontSize:"11px",color:S.mut,marginBottom:"12px",fontFamily:S.mono}}>{new Date(viewHist.date).toLocaleString()}</div>
          {resultChanged&&<div style={{background:S.ybg,border:`1px solid ${S.ybrd}`,borderRadius:"12px",padding:"10px 14px",marginBottom:"14px",fontSize:"12px",color:S.y,fontWeight:500}}>⚠️ Result differs from original — allergen profile has changed</div>}
          <div style={{padding:"24px 20px",borderRadius:"20px",marginBottom:"16px",background:sb(lr.overall),border:`1.5px solid ${sbrd(lr.overall)}`,textAlign:"center",boxShadow:S.shadowSm}}>
            <div style={{fontSize:"44px",marginBottom:"6px"}}>{lr.overall==="safe"?"✅":lr.overall==="caution"?"⚠️":"🚫"}</div>
            <div style={{fontSize:"22px",fontWeight:400,fontFamily:S.sf,color:sc(lr.overall),letterSpacing:"-0.3px"}}>{lr.overall==="safe"?"Likely Safe":lr.overall==="caution"?"Use Caution":"Contains Allergens"}</div>
            <div style={{fontSize:"13px",color:S.mut,marginTop:"6px",lineHeight:1.5}}>{lr.summary}</div>
          </div>
          <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
            {[{l:"Danger",c:lr.dc,color:S.r,bg:S.rbg,brd:S.rbrd},{l:"Caution",c:lr.cc,color:S.y,bg:S.ybg,brd:S.ybrd},{l:"Safe",c:lr.sc,color:S.g,bg:S.gbg,brd:S.gbrd}].map(s=>(
              <div key={s.l} style={{flex:1,padding:"12px 8px",borderRadius:"14px",background:s.bg,textAlign:"center",border:`1px solid ${s.brd}`,boxShadow:S.shadowSm}}>
                <div style={{fontSize:"22px",fontWeight:400,fontFamily:S.sf,color:s.color}}>{s.c}</div>
                <div style={{fontSize:"9px",color:s.color,fontWeight:700,textTransform:"uppercase",fontFamily:S.mono,letterSpacing:"0.5px"}}>{s.l}</div>
              </div>
            ))}
          </div>
          {lr.items.filter(i=>i.status!=="safe").length>0&&<div style={{fontSize:"11px",color:S.r,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"9px",fontWeight:700,fontFamily:S.mono}}>✕ Flagged ({lr.items.filter(i=>i.status!=="safe").length})</div>}
          {lr.items.filter(i=>i.status!=="safe").map((item,i)=>(
            <div key={i} style={{padding:"12px 14px",marginBottom:"6px",borderRadius:"12px",background:sb(item.status),border:`1px solid ${sbrd(item.status)}`,display:"flex",alignItems:"flex-start",gap:"10px"}}>
              <div style={{width:"8px",height:"8px",borderRadius:"50%",marginTop:"6px",background:sc(item.status),flexShrink:0}} />
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:"13px",color:S.text}}>{item.ingredient}{item.allergen&&<span style={{marginLeft:"7px",fontSize:"10px",padding:"2px 7px",background:`${sc(item.status)}15`,borderRadius:"6px",color:sc(item.status),fontWeight:700,fontFamily:S.mono}}>{item.allergen}</span>}</div>
                <div style={{fontSize:"11px",color:S.mut,marginTop:"2px"}}>{item.reason}</div>
              </div>
            </div>
          ))}
          {lr.items.filter(i=>i.status==="safe").length>0&&<>
            <div style={{fontSize:"11px",color:S.g,textTransform:"uppercase",letterSpacing:"1px",margin:"14px 0 9px",fontWeight:700,fontFamily:S.mono}}>✓ Safe ({lr.items.filter(i=>i.status==="safe").length})</div>
            {lr.items.filter(i=>i.status==="safe").map((item,i)=>(
              <div key={i} style={{padding:"9px 14px",marginBottom:"4px",borderRadius:"10px",background:S.gbg,border:`1px solid ${S.gbrd}`,fontSize:"12px",color:S.mut,display:"flex",alignItems:"center",gap:"8px"}}><span style={{color:S.g,fontWeight:700}}>✓</span>{item.ingredient}</div>
            ))}
          </>}

          {viewHist.ingredients&&viewHist.ingredients.length>20&&<details style={{marginTop:"16px"}}>
            <summary style={{fontSize:"11px",color:S.mut,cursor:"pointer",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",fontFamily:S.mono}}>View full ingredient list</summary>
            <div style={{marginTop:"10px",padding:"14px 16px",borderRadius:"12px",background:S.card,border:`1px solid ${S.brd}`,fontSize:"12px",color:S.mut,lineHeight:1.75,fontFamily:S.mono,boxShadow:S.shadowSm}}>{viewHist.ingredients}</div>
          </details>}
          </div>{/* end histDetail share capture */}
        </div>);})()}

        {/* ═══ SCANNER ═══ */}
        {pg==="scanner"&&<div style={{animation:"fadeUp 0.3s ease both"}}>
          <h1 style={{fontFamily:S.sf,fontSize:"26px",fontWeight:400,color:S.text,margin:"0 0 4px",letterSpacing:"-0.3px"}}>Ingredient Scanner</h1>
          <p style={{color:S.mut,fontSize:"13px",marginBottom:"18px",lineHeight:1.5}}>Scan a barcode, search by name, or paste ingredients manually.</p>

          {/* Tab bar */}
          <div style={{display:"flex",gap:"5px",marginBottom:"18px",background:S.card,borderRadius:"14px",padding:"5px",border:`1px solid ${S.brd}`,boxShadow:S.shadowSm}}>
            {[{id:"photo",icon:"📷",label:"Barcode"},{id:"search",icon:"🔍",label:"Search"},{id:"manual",icon:"✏️",label:"Manual"}].map(t=>(
              <button key={t.id} onClick={()=>{ setScannerTab(t.id); setFoodResults([]); setFoodError(""); setNutResults([]); setNutError(""); setBarcodeError(""); if(t.id!=="photo") stopBarcodeScanner(); }}
                style={{flex:1,padding:"10px 0",border:"none",borderRadius:"10px",fontFamily:S.f,fontSize:"13px",fontWeight:600,cursor:"pointer",transition:"all 0.15s",
                  background:scannerTab===t.id?S.pGrad:"transparent",
                  color:scannerTab===t.id?"#fff":S.mut,
                  boxShadow:scannerTab===t.id?S.shadowBlue:"none"}}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          {/* Barcode tab */}
          {scannerTab==="photo"&&<div>
            {foodNoIngredients&&<div style={{background:S.ybg,border:`1px solid ${S.ybrd}`,borderRadius:"14px",padding:"14px 16px",marginBottom:"16px",display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <span style={{fontSize:"18px",flexShrink:0}}>🔍</span>
              <div>
                <div style={{fontSize:"13px",color:S.y,fontWeight:600,marginBottom:"3px"}}>No ingredient list found for "{foodNoIngredients}"</div>
                <div style={{fontSize:"12px",color:S.mut}}>Scan the product's barcode below for a full allergen check.</div>
              </div>
              <button onClick={()=>setFoodNoIngredients("")} style={{marginLeft:"auto",background:"none",border:"none",color:S.mut2,fontSize:"18px",cursor:"pointer",padding:"0",flexShrink:0}}>×</button>
            </div>}
            {!barcodeScanning ? (
              <div style={{padding:"36px 20px",background:S.card,border:`2px dashed ${S.brd}`,borderRadius:"18px",textAlign:"center",marginBottom:"16px",boxShadow:S.shadowSm}}>
                <div style={{fontSize:"40px",marginBottom:"12px"}}>📦</div>
                <div style={{fontSize:"15px",color:S.text,fontWeight:600,marginBottom:"6px",fontFamily:S.sf,fontWeight:400}}>Scan a Barcode</div>
                <div style={{fontSize:"13px",color:S.mut,marginBottom:"20px",lineHeight:1.5}}>Point your camera at the barcode on the product</div>
                <button onClick={startBarcodeScanner} style={{padding:"12px 30px",background:S.pGrad,border:"none",borderRadius:"12px",color:"#fff",fontSize:"14px",fontWeight:700,cursor:"pointer",fontFamily:S.f,boxShadow:S.shadowBlue}}>Start Scanner</button>
              </div>
            ) : (
              <div style={{marginBottom:"16px"}}>
                <div style={{position:"relative",borderRadius:"16px",overflow:"hidden",background:"#000",marginBottom:"12px",boxShadow:S.shadowMd}}>
                  <video id="barcode-video" style={{width:"100%",display:"block",maxHeight:"230px",objectFit:"cover"}} />
                  <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:"200px",height:"80px",border:`2px solid ${S.p2}`,borderRadius:"10px",pointerEvents:"none",boxShadow:`0 0 0 4px rgba(0,82,255,0.15)`}} />
                  {barcodeLoading&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:"#fff",fontWeight:600}}>⏳ Looking up product…</div>}
                </div>
                {barcodeError&&<div style={{background:S.rbg,border:`1px solid ${S.rbrd}`,borderRadius:"12px",padding:"11px 14px",fontSize:"13px",color:S.r,marginBottom:"10px"}}>{barcodeError}</div>}
                <button onClick={stopBarcodeScanner} style={{width:"100%",padding:"12px",background:S.card,border:`1.5px solid ${S.brd}`,borderRadius:"12px",color:S.mut,fontSize:"13px",cursor:"pointer",fontFamily:S.f,fontWeight:600}}>Stop Scanner</button>
              </div>
            )}
          </div>}

          {/* Search tab */}
          {scannerTab==="search"&&<div style={{marginBottom:"16px"}}>
            <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
              <input value={foodQuery}
                onChange={e=>{setFoodQuery(e.target.value);if(foodError)setFoodError("");if(foodResults.length)setFoodResults([]);}}
                onKeyDown={e=>e.key==="Enter"&&searchFood()}
                placeholder="e.g. Oreo, Chobani Greek yogurt, Tyson nuggets..."
                style={{flex:1,padding:"12px 14px",background:S.card,border:`1.5px solid ${foodError?S.rbrd:S.brd}`,borderRadius:"12px",color:S.text,fontSize:"14px",fontFamily:S.f,boxSizing:"border-box",boxShadow:S.shadowSm}} />
              <button onClick={()=>searchFood()} disabled={!foodQuery.trim()||foodLoading}
                style={{padding:"12px 20px",background:foodQuery.trim()&&!foodLoading?S.pGrad:"#F3F4F6",border:"none",borderRadius:"12px",color:foodQuery.trim()&&!foodLoading?"#fff":S.mut2,fontSize:"14px",fontWeight:700,cursor:foodQuery.trim()&&!foodLoading?"pointer":"default",fontFamily:S.f,whiteSpace:"nowrap",boxShadow:foodQuery.trim()&&!foodLoading?S.shadowBlue:"none"}}>
                {foodLoading?"…":"Search"}
              </button>
            </div>
            {foodError&&<div style={{fontSize:"13px",color:S.r,marginBottom:"10px",padding:"10px 14px",background:S.rbg,border:`1px solid ${S.rbrd}`,borderRadius:"10px"}}>{foodError}</div>}
            {foodResults.length>0&&<div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
              {foodResults.map((item,i)=>(
                <button key={i} onClick={()=>pickFoodResult(item)}
                  style={{padding:"13px 14px",background:S.card,border:`1px solid ${S.brd}`,borderRadius:"12px",cursor:"pointer",fontFamily:S.f,color:S.text,textAlign:"left",display:"flex",alignItems:"center",gap:"10px",width:"100%",boxShadow:S.shadowSm}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:"14px",color:S.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.label}</div>
                    <div style={{fontSize:"11px",color:S.mut,marginTop:"2px"}}>{item.brand||""}{item.ingredients?<span style={{marginLeft:item.brand?6:0,color:S.mut2}}>{item.ingredients.split(",").slice(0,3).join(", ")}{item.ingredients.split(",").length>3?"…":""}</span>:<span style={{marginLeft:item.brand?6:0,color:S.mut2}}>Allergen check by name</span>}</div>
                  </div>
                  <span style={{fontSize:"12px",color:S.p,fontWeight:700,flexShrink:0}}>Scan →</span>
                </button>
              ))}
            </div>}
            {!foodLoading&&foodResults.length===0&&!foodError&&<div style={{padding:"28px 20px",textAlign:"center",background:S.card,borderRadius:"16px",border:`1px solid ${S.brd}`,boxShadow:S.shadowSm}}>
              <div style={{fontSize:"32px",marginBottom:"8px"}}>🔍</div>
              <div style={{fontSize:"13px",color:S.mut}}>Search the USDA food database to scan a product</div>
            </div>}
          </div>}

          {/* Manual tab */}
          {scannerTab==="manual"&&<div style={{marginBottom:"16px"}}>
            <input value={photoLabel} onChange={e=>setPhotoLabel(e.target.value)} placeholder="Item name (e.g. Oreo, Lay's Classic)"
              style={{width:"100%",padding:"13px 16px",background:S.card,border:`1.5px solid ${S.brd}`,borderRadius:"14px",color:S.text,fontFamily:S.f,fontSize:"14px",boxSizing:"border-box",marginBottom:"10px",boxShadow:S.shadowSm}} />
            <textarea value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Paste or type ingredient list here..."
              style={{width:"100%",minHeight:"140px",padding:"16px",background:S.card,border:`1.5px solid ${S.brd}`,borderRadius:"16px",color:S.text,fontFamily:S.f,fontSize:"14px",lineHeight:1.65,resize:"vertical",boxSizing:"border-box",boxShadow:S.shadowSm}} />
          </div>}

          {/* Scan button */}
          {txt.trim()&&!ocrBad&&<button onClick={()=>doScan(txt, photoLabel.trim()||"")}
            style={{width:"100%",padding:"16px",background:S.pGrad,border:"none",borderRadius:"14px",color:"#fff",fontSize:"15px",fontWeight:700,cursor:"pointer",fontFamily:S.f,boxShadow:S.shadowBlue,letterSpacing:"-0.2px"}}>
            🔬 Scan for Allergens
          </button>}
          {!txt.trim()&&scannerTab!=="search"&&<button disabled
            style={{width:"100%",padding:"16px",background:"#F3F4F6",border:`1px solid ${S.brd}`,borderRadius:"14px",color:S.mut2,fontSize:"15px",fontWeight:700,cursor:"default",fontFamily:S.f}}>
            🔬 Scan for Allergens
          </button>}
        </div>}

        {/* ═══ RESULTS ═══ */}
        {pg==="results"&&res&&<div style={{animation:"fadeUp 0.3s ease both"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
            <button onClick={goBackFromResults} style={{background:"none",border:"none",color:S.p,fontSize:"13px",cursor:"pointer",fontFamily:S.f,fontWeight:700,display:"flex",alignItems:"center",gap:"4px"}}>‹ Back</button>
            <button onClick={()=>shareResults(res,resLabel)} disabled={copied==="loading"} style={{padding:"8px 16px",background:copied===true?S.gbg:S.card,border:`1.5px solid ${copied===true?S.gbrd:S.brd}`,borderRadius:"20px",color:copied===true?S.g:S.mut,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:700,boxShadow:S.shadowSm}}>
              {copied==="loading"?"⏳ Saving…":copied===true?"✓ Shared":"📤 Share"}
            </button>
          </div>
          <div ref={resultsRef} style={{background:S.bg,borderRadius:"16px",padding:"4px 0"}}>
          <h2 style={{fontFamily:S.sf,fontSize:"24px",fontWeight:400,color:S.text,margin:"0 0 16px",letterSpacing:"-0.3px"}}>{resLabel||"Scan Results"}</h2>
          <div style={{padding:"28px 24px",borderRadius:"22px",marginBottom:"16px",background:sb(res.overall),border:`1.5px solid ${sbrd(res.overall)}`,textAlign:"center",boxShadow:S.shadowSm}}>
            <div style={{fontSize:"52px",marginBottom:"8px"}}>{res.overall==="safe"?"✅":res.overall==="caution"?"⚠️":"🚫"}</div>
            <div style={{fontSize:"24px",fontWeight:400,fontFamily:S.sf,color:sc(res.overall),marginBottom:"8px",letterSpacing:"-0.3px"}}>{res.overall==="safe"?"Looks Safe":res.overall==="caution"?"Use Caution":"Contains Allergens"}</div>
            <div style={{fontSize:"13px",color:S.mut,lineHeight:1.55}}>{res.summary}</div>
          </div>
          <div style={{display:"flex",gap:"8px",marginBottom:"18px"}}>
            {[{l:"Danger",c:res.items.filter(i=>i.status==="danger").length,color:S.r,bg:S.rbg,brd:S.rbrd},{l:"Caution",c:res.items.filter(i=>i.status==="caution").length,color:S.y,bg:S.ybg,brd:S.ybrd},{l:"Safe",c:res.items.filter(i=>i.status==="safe").length,color:S.g,bg:S.gbg,brd:S.gbrd}].map(s=>(
              <div key={s.l} style={{flex:1,padding:"14px 10px",borderRadius:"16px",background:s.bg,textAlign:"center",border:`1px solid ${s.brd}`,boxShadow:S.shadowSm}}>
                <div style={{fontSize:"24px",fontWeight:400,fontFamily:S.sf,color:s.color,lineHeight:1}}>{s.c}</div>
                <div style={{fontSize:"9px",color:s.color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginTop:"5px",fontFamily:S.mono}}>{s.l}</div>
              </div>
            ))}
          </div>
          {/* Name-only scan notice */}
          {res.scannedText&&res.items.length<=2&&res.items.every(i=>res.scannedText.trim().toLowerCase().startsWith(i.ingredient.toLowerCase()))&&(
            <div style={{padding:"12px 14px",borderRadius:"12px",background:S.ybg,border:`1px solid ${S.ybrd}`,marginBottom:"14px",fontSize:"12px",color:S.y,fontWeight:500}}>
              ⚠️ No ingredient list found — result is based on the food name only. For a full check, paste the label ingredients in the Manual tab.
            </div>
          )}

          {/* Flagged ingredients */}
          {res.items.filter(i=>i.status!=="safe").length>0&&<>
            <div style={{fontSize:"11px",color:S.r,textTransform:"uppercase",letterSpacing:"1px",fontWeight:700,marginBottom:"9px",fontFamily:S.mono}}>Flagged ({res.items.filter(i=>i.status!=="safe").length})</div>
            {res.items.filter(i=>i.status!=="safe").map((item,i)=>(
              <div key={i} style={{padding:"13px 16px",marginBottom:"6px",borderRadius:"14px",background:sb(item.status),border:`1px solid ${sbrd(item.status)}`,display:"flex",alignItems:"flex-start",gap:"10px"}}>
                <div style={{width:"8px",height:"8px",borderRadius:"50%",marginTop:"6px",background:sc(item.status),flexShrink:0}} />
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:"13px",color:S.text}}>{item.ingredient}{item.allergen&&<span style={{marginLeft:"7px",fontSize:"10px",padding:"2px 7px",background:`${sc(item.status)}15`,borderRadius:"6px",color:sc(item.status),fontWeight:700,fontFamily:S.mono}}>{item.allergen}</span>}</div>
                  <div style={{fontSize:"11px",color:S.mut,marginTop:"2px"}}>{item.reason}</div>
                </div>
              </div>
            ))}
          </>}

          {res.items.filter(i=>i.status==="safe").length>0&&<>

            {viewChain.menu.filter(m=>m.a.some(a=>prof.allergens.includes(a))).map((m,i)=>{
              const hits=m.a.filter(a=>prof.allergens.includes(a));
              return(<div key={i} style={{padding:"12px 14px",marginBottom:"5px",borderRadius:"12px",background:S.rbg,border:`1px solid ${S.rbrd}`,display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{color:S.r,fontSize:"15px",fontWeight:700}}>✕</span>
                <div><div style={{fontWeight:600,fontSize:"13px",color:S.text2}}>{m.name}</div>
                <div style={{fontSize:"10px",color:S.mut,marginTop:"2px"}}>{hits.map(a=><span key={a} style={{marginRight:"6px",padding:"2px 7px",background:S.rbg,borderRadius:"5px",color:S.r,fontSize:"10px",fontWeight:600,border:`1px solid ${S.rbrd}`}}>{(AL.find(function(x){return x.id===a})||{}).icon} {(AL.find(function(x){return x.id===a})||{}).label}</span>)}</div></div>
              </div>);
            })}
          </>}
        </div>}

        {/* ═══ PROFILE ═══ */}
        {pg==="profile"&&<div style={{animation:"fadeUp 0.3s ease both"}}>
          <h1 style={{fontFamily:S.sf,fontSize:"26px",fontWeight:400,color:S.text,margin:"0 0 16px",letterSpacing:"-0.3px"}}>Your Profile</h1>

          {/* Profile card — light */}
          <div style={{padding:"22px",borderRadius:"20px",background:S.card,border:`1px solid ${S.brd}`,marginBottom:"14px",boxShadow:S.shadowSm,display:"flex",alignItems:"center",gap:"16px"}}>
            <div style={{width:"54px",height:"54px",borderRadius:"50%",background:S.pGrad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",fontWeight:700,color:"#fff",boxShadow:S.shadowBlue,flexShrink:0}}>{prof.name.charAt(0).toUpperCase()}</div>
            <div>
              <div style={{fontWeight:700,fontSize:"19px",color:S.text}}>{prof.name}</div>
              <div style={{fontSize:"12px",color:S.mut,fontFamily:S.mono,marginTop:"2px"}}>{currentUser} · Since {new Date(prof.createdAt).toLocaleDateString()}</div>
            </div>
          </div>

          {/* Allergens card */}
          <div style={{padding:"20px",borderRadius:"18px",background:S.card,border:`1px solid ${S.brd}`,marginBottom:"14px",boxShadow:S.shadowSm}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",fontFamily:S.mono,fontWeight:700}}>Allergens</div>
              {!editingAllergens?
                <button onClick={()=>{setEditAllergens([...prof.allergens]);setEditCustomList([...(prof.customAllergens||[])]);setEditCustomInput("");setEditingAllergens(true);}} style={{background:S.pbg,border:`1px solid ${S.pBrd}`,borderRadius:"8px",color:S.p,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:700,padding:"4px 12px"}}>Edit</button>:
                <div style={{display:"flex",gap:"8px"}}>
                  <button onClick={()=>setEditingAllergens(false)} style={{background:"none",border:"none",color:S.mut,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:600}}>Cancel</button>
                  <button onClick={saveAllergenEdits} disabled={editAllergens.length===0} style={{background:editAllergens.length===0?"#F3F4F6":"linear-gradient(135deg,#16a34a,#15803d)",border:"none",borderRadius:"8px",color:editAllergens.length===0?S.mut2:"#fff",fontSize:"12px",cursor:editAllergens.length===0?"default":"pointer",fontFamily:S.f,fontWeight:700,padding:"4px 12px"}}>Save{editAllergens.length===0?" (1+ needed)":""}</button>
                </div>
              }
            </div>
            {!editingAllergens?
              <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                {prof.allergens.map(id=>{const a=AL.find(x=>x.id===id);return <span key={id} style={{padding:"5px 11px",background:S.pbg,border:`1px solid ${S.pBrd}`,borderRadius:"20px",fontSize:"12px",color:S.p,fontWeight:600}}>{a&&a.icon} {a&&a.label}</span>;})}
                {(prof.customAllergens||[]).map((c,i)=><span key={"c"+i} style={{padding:"5px 11px",background:S.ybg,border:`1px solid ${S.ybrd}`,borderRadius:"20px",fontSize:"12px",color:S.y,fontWeight:600}}>✦ {c}</span>)}
              </div>:
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"12px"}}>
                  {AL.map(a=>{const sel=editAllergens.includes(a.id);return(
                    <button key={a.id} onClick={()=>setEditAllergens(p=>sel?p.filter(x=>x!==a.id):[...p,a.id])}
                      style={{padding:"9px 10px",background:sel?S.pbg:S.bg,border:sel?`1.5px solid ${S.pBrd}`:`1.5px solid ${S.brd}`,borderRadius:"10px",cursor:"pointer",display:"flex",alignItems:"center",gap:"6px",fontFamily:S.f,color:sel?S.p:S.mut,fontSize:"12px",fontWeight:sel?600:400,transition:"all 0.15s"}}>
                      <span style={{fontSize:"16px"}}>{a.icon}</span><span style={{flex:1,textAlign:"left"}}>{a.label}</span>{sel&&<span style={{color:S.p,fontWeight:700,fontSize:"12px"}}>✓</span>}
                    </button>
                  );})}
                </div>
                <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",fontWeight:700,marginBottom:"8px",fontFamily:S.mono}}>Custom allergens</div>
                <div style={{display:"flex",gap:"7px",marginBottom:"8px"}}>
                  <input value={editCustomInput} onChange={e=>setEditCustomInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&editCustomInput.trim()){setEditCustomList(p=>[...p,editCustomInput.trim()]);setEditCustomInput("");}}} placeholder="e.g. corn, MSG, latex..." style={{flex:1,padding:"9px 12px",background:S.bg,border:`1.5px solid ${S.brd}`,borderRadius:"10px",color:S.text,fontSize:"12px",fontFamily:S.f}} />
                  <button onClick={()=>{if(editCustomInput.trim()){setEditCustomList(p=>[...p,editCustomInput.trim()]);setEditCustomInput("");}}} style={{padding:"9px 14px",background:S.pbg,border:`1.5px solid ${S.pBrd}`,borderRadius:"10px",color:S.p,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:700}}>Add</button>
                </div>
                {editCustomList.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{editCustomList.map((c,i)=><span key={i} style={{padding:"4px 10px",background:S.ybg,border:`1px solid ${S.ybrd}`,borderRadius:"20px",fontSize:"12px",color:S.y,display:"flex",alignItems:"center",gap:"5px",fontWeight:600}}>{c}<button onClick={()=>setEditCustomList(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:S.y,cursor:"pointer",fontSize:"13px",padding:"0",lineHeight:1}}>×</button></span>)}</div>}
              </div>
            }
          </div>

          {/* Stats */}
          <div style={{padding:"20px",borderRadius:"18px",background:S.card,border:`1px solid ${S.brd}`,marginBottom:"14px",boxShadow:S.shadowSm}}>
            <div style={{fontSize:"11px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"12px",fontFamily:S.mono,fontWeight:700}}>Scan Statistics</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
              {[{l:"Total Scans",v:hist.length,c:S.p,bg:S.pbg,brd:S.pBrd},{l:"Safe",v:hist.filter(h=>liveResult(h).overall==="safe").length,c:S.g,bg:S.gbg,brd:S.gbrd},{l:"Danger",v:hist.filter(h=>liveResult(h).overall==="danger").length,c:S.r,bg:S.rbg,brd:S.rbrd},{l:"Caution",v:hist.filter(h=>liveResult(h).overall==="caution").length,c:S.y,bg:S.ybg,brd:S.ybrd}].map(s=>(
                <div key={s.l} style={{padding:"14px",borderRadius:"14px",background:s.bg,border:`1px solid ${s.brd}`}}>
                  <span style={{fontSize:"26px",fontWeight:400,fontFamily:S.sf,color:s.c}}>{s.v}</span>
                  <div style={{fontSize:"10px",color:s.c,opacity:0.8,marginTop:"3px",fontFamily:S.mono,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px"}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Emergency Card — light red tint */}
          <div style={{padding:"22px",borderRadius:"18px",background:S.card,border:`1.5px solid ${S.rbrd}`,marginBottom:"14px",boxShadow:S.shadowSm}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                <span style={{fontSize:"16px"}}>🚨</span>
                <div style={{fontSize:"11px",color:S.r,textTransform:"uppercase",letterSpacing:"1px",fontWeight:700,fontFamily:S.mono}}>Emergency Card</div>
              </div>
              <button onClick={()=>{setShowEmergencyEdit(!showEmergencyEdit);if(!showEmergencyEdit){setEmergencyContact(prof.emergencyContact||"");setEmergencyPhone(prof.emergencyPhone||"");}}} style={{background:S.pbg,border:`1px solid ${S.pBrd}`,borderRadius:"8px",color:S.p,fontSize:"12px",cursor:"pointer",fontFamily:S.f,fontWeight:700,padding:"5px 14px"}}>{showEmergencyEdit?"Cancel":"Edit"}</button>
            </div>
            {showEmergencyEdit?(
              <div>
                <label style={{fontSize:"11px",color:S.mut,display:"block",marginBottom:"6px",fontFamily:S.mono,fontWeight:600,textTransform:"uppercase",letterSpacing:"1px"}}>Emergency Contact Name</label>
                <input value={emergencyContact} onChange={e=>setEmergencyContact(e.target.value)} placeholder="e.g. Mom, Dr. Smith"
                  style={{width:"100%",padding:"11px 13px",background:S.bg,border:`1.5px solid ${S.brd}`,borderRadius:"10px",color:S.text,fontSize:"13px",fontFamily:S.f,boxSizing:"border-box",marginBottom:"12px"}} />
                <label style={{fontSize:"11px",color:S.mut,display:"block",marginBottom:"6px",fontFamily:S.mono,fontWeight:600,textTransform:"uppercase",letterSpacing:"1px"}}>Emergency Phone</label>
                <input value={emergencyPhone} onChange={e=>setEmergencyPhone(e.target.value)} placeholder="(555) 123-4567"
                  style={{width:"100%",padding:"11px 13px",background:S.bg,border:`1.5px solid ${S.brd}`,borderRadius:"10px",color:S.text,fontSize:"13px",fontFamily:S.f,boxSizing:"border-box",marginBottom:"12px"}} />
                <button onClick={saveEmergency} style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,#16a34a,#15803d)",border:"none",borderRadius:"10px",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>Save Emergency Info</button>
              </div>
            ):(
              <div>
                <div style={{padding:"16px",borderRadius:"14px",background:S.rbg,border:`1px solid ${S.rbrd}`,marginBottom:"10px"}}>
                  <div style={{fontSize:"17px",fontWeight:700,color:S.text,marginBottom:"8px"}}>{prof.name}</div>
                  <div style={{fontSize:"12px",color:S.mut,marginBottom:"10px"}}>I have the following food allergies:</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"12px"}}>
                    {prof.allergens.map(id=>{const a=AL.find(x=>x.id===id);return <span key={id} style={{padding:"5px 11px",background:S.rbg,border:`1px solid ${S.rbrd}`,borderRadius:"20px",fontSize:"12px",color:S.r,fontWeight:600}}>{a&&a.icon} {a&&a.label}</span>;})}
                  </div>
                  {(prof.emergencyContact||prof.emergencyPhone)&&(
                    <div style={{borderTop:`1px solid ${S.brd}`,paddingTop:"10px",marginTop:"4px"}}>
                      <div style={{fontSize:"10px",color:S.mut,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"5px",fontFamily:S.mono,fontWeight:700}}>Emergency Contact</div>
                      {prof.emergencyContact&&<div style={{fontSize:"14px",color:S.text,fontWeight:700}}>{prof.emergencyContact}</div>}
                      {prof.emergencyPhone&&<div style={{fontSize:"13px",color:S.p,fontFamily:S.mono,marginTop:"2px"}}>{prof.emergencyPhone}</div>}
                    </div>
                  )}
                  {!prof.emergencyContact&&!prof.emergencyPhone&&(
                    <div style={{fontSize:"11px",color:S.mut,fontStyle:"italic"}}>Tap Edit to add an emergency contact</div>
                  )}
                </div>
                <div style={{fontSize:"10px",color:S.mut,textAlign:"center",fontFamily:S.mono}}>Show this card to restaurant staff or anyone preparing your food</div>
              </div>
            )}
          </div>

          {/* Actions */}
          <button onClick={doLogout} style={{width:"100%",padding:"14px",marginBottom:"8px",background:S.pbg,border:`1.5px solid ${S.pBrd}`,borderRadius:"14px",color:S.p,fontSize:"14px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>
            Log Out
          </button>
          {!confirmDelete?
            <button onClick={()=>{setConfirmDelete(true);setDeletePassword("");setDeleteError("");}} style={{width:"100%",padding:"14px",background:S.rbg,border:`1.5px solid ${S.rbrd}`,borderRadius:"14px",color:S.r,fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>
              Delete Account
            </button>:
            <div style={{padding:"18px",borderRadius:"14px",background:S.rbg,border:`1.5px solid ${S.rbrd}`}}>
              {deleting ? (
                <div style={{textAlign:"center",padding:"20px 0"}}>
                  <div style={{fontSize:"30px",marginBottom:"10px"}}>⏳</div>
                  <div style={{fontSize:"14px",color:S.r,fontWeight:600}}>Deleting your account…</div>
                  <div style={{fontSize:"12px",color:S.mut,marginTop:"6px"}}>This may take a few seconds.</div>
                </div>
              ) : (<>
              <div style={{fontSize:"13px",color:S.r,marginBottom:"12px",fontWeight:600}}>⚠️ This permanently deletes your account, allergens, and scan history.</div>
              <input type="password" value={deletePassword} onChange={e=>{setDeletePassword(e.target.value);setDeleteError("");}} placeholder="Enter your password to confirm"
                style={{width:"100%",padding:"11px 12px",background:S.card,border:`1.5px solid ${S.rbrd}`,borderRadius:"10px",color:S.text,fontSize:"13px",fontFamily:S.f,boxSizing:"border-box",marginBottom:"6px"}} />
              <button onClick={async()=>{
                const email = auth.currentUser?.email;
                if (!email) { setDeleteError("No email found — try logging out and back in."); return; }
                try {
                  await auth.sendPasswordResetEmail(email);
                  setDeleteError("✓ Reset email sent to " + email + " — check your inbox and spam folder.");
                } catch(e) {
                  setDeleteError("Couldn't send reset email: " + (e.message||"Try again."));
                }
              }} style={{background:"none",border:"none",color:S.p,fontSize:"11px",cursor:"pointer",fontFamily:S.f,fontWeight:600,padding:"0 0 10px",display:"block"}}>Forgot password? Send reset email</button>
              {deleteError&&<div style={{fontSize:"12px",color:deleteError.includes("sent")?S.g:S.r,marginBottom:"10px",fontWeight:600}}>{deleteError}</div>}
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>{setConfirmDelete(false);setDeletePassword("");setDeleteError("");setDeleting(false);}} style={{flex:1,padding:"11px",background:S.card,border:`1.5px solid ${S.brd}`,borderRadius:"10px",color:S.mut,fontSize:"13px",cursor:"pointer",fontFamily:S.f,fontWeight:600}}>Cancel</button>
                <button onClick={doDeleteAccount} style={{flex:1,padding:"11px",background:S.r,border:"none",borderRadius:"10px",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:S.f}}>Yes, Delete</button>
              </div>
              </>)}
            </div>
          }
        </div>}
      </main>

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(250,250,250,0.97)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:`1px solid ${S.brd}`,paddingBottom:"env(safe-area-inset-bottom,8px)",display:"flex",zIndex:100,boxShadow:"0 -4px 24px rgba(0,0,0,0.06)"}}>
        <NavBtn id="home" icon="🏠" label="Home" />
        <NavBtn id="scanner" icon="🔬" label="Scan" />
        <NavBtn id="nutrition" icon="🍎" label="Nutrition" />
        <NavBtn id="dining" icon="📍" label="Dining" />
        <NavBtn id="profile" icon="👤" label="Profile" />
      </nav>
    </div>
  );
}

// ─── RENDER ───
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
